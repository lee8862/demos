<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>UI 需求标注（响应式 fit-to-screen）</title>
<style>
:root{--accent:#1677ff;--danger:#ff4d4f;--border:#d9d9d9;--bg:#f0f2f5;--box-bg:#fffbe6;--box-border:#ffe58f;--box-doc:#e6f4ff;--box-doc-border:#91caff;--box-diff:#fff1f0;--box-diff-border:#ffa39e}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:#333;overflow-x:hidden;overflow-y:auto}
.topbar{position:fixed;top:0;left:0;right:0;height:48px;background:#fff;border-bottom:1px solid #e8e8e8;display:flex;align-items:center;padding:0 16px;z-index:9999;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.topbar h1{font-size:14px;font-weight:700;color:#222;margin-right:16px;white-space:nowrap}
.tab-bar{display:flex;gap:4px;overflow-x:auto;flex:1}
.tab-btn{padding:5px 12px;border:1px solid var(--border);border-radius:6px;background:#fff;cursor:pointer;font-size:12px;white-space:nowrap;transition:all .15s;color:#555}
.tab-btn:hover{border-color:var(--accent);color:var(--accent)}
.tab-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.legend{display:flex;gap:12px;margin-left:auto;font-size:11px;align-items:center;white-space:nowrap}
.legend-item{display:flex;align-items:center;gap:4px}
.legend-dot{width:10px;height:10px;border-radius:2px}
.scale-wrapper{position:relative;margin-top:48px;overflow:hidden}
.canvas{position:relative;width:1800px;height:1300px;transform-origin:0 0}
.ui-frame-wrap{position:absolute;left:340px;top:20px;width:980px;height:720px;border:2px solid #d0d0d0;border-radius:8px;overflow:hidden;background:#fff;box-shadow:0 4px 20px rgba(0,0,0,.1);z-index:1}
.ui-frame-wrap iframe{width:100%;height:100%;border:none}
.iframe-hint{position:absolute;bottom:-26px;left:0;right:0;text-align:center;font-size:11px;color:#aaa}
.nav-guide{position:absolute;bottom:-50px;left:0;right:0;text-align:center;font-size:12px;padding:4px 12px;transition:all .3s}
.nav-guide.ok{color:#52c41a}
.nav-guide.fail{color:#faad14;font-weight:600}
.nav-guide.working{color:var(--accent)}
.anno-box{position:absolute;min-width:180px;max-width:290px;border-radius:6px;padding:10px 12px;font-size:12px;line-height:1.6;z-index:10;user-select:none;box-shadow:0 2px 8px rgba(0,0,0,.08);transition:box-shadow .12s}
.anno-box.src-doc{background:var(--box-doc);border:1px solid var(--box-doc-border)}
.anno-box.src-code{background:var(--box-bg);border:1px solid var(--box-border)}
.anno-box.src-diff{background:var(--box-diff);border:1px solid var(--box-diff-border)}
.anno-box:hover{box-shadow:0 4px 16px rgba(0,0,0,.15);z-index:20}
.anno-box.selected{box-shadow:0 0 0 2px rgba(22,119,255,.3);z-index:30}
.anno-box .anno-title{font-weight:700;font-size:13px;color:#222;margin-bottom:4px;padding-bottom:3px;cursor:text;outline:none}
.anno-box.src-doc .anno-title{border-bottom:1px dashed var(--box-doc-border)}
.anno-box.src-code .anno-title{border-bottom:1px dashed var(--box-border)}
.anno-box.src-diff .anno-title{border-bottom:1px dashed var(--box-diff-border)}
.anno-box .anno-desc{color:#555;font-size:12px;line-height:1.65;cursor:text;outline:none}
.anno-box .drag-handle{position:absolute;top:0;left:0;right:0;height:28px;cursor:move}
.anno-box .src-tag{position:absolute;top:-9px;right:8px;font-size:10px;padding:1px 6px;border-radius:3px;color:#fff;font-weight:600}
.src-tag.doc{background:#1677ff}
.src-tag.code{background:#faad14}
.src-tag.diff{background:#ff4d4f}
.src-tag.extra{background:#52c41a}
.anno-box .move-controls{display:none;position:absolute;top:-26px;left:50%;transform:translateX(-50%);background:#fff;border:1px solid #d9d9d9;border-radius:4px;padding:1px;white-space:nowrap;box-shadow:0 2px 6px rgba(0,0,0,.12)}
.anno-box.selected .move-controls{display:flex;gap:1px}
.move-btn{width:20px;height:20px;border:none;background:#fafafa;cursor:pointer;font-size:13px;line-height:20px;text-align:center;border-radius:3px;color:#666}
.move-btn:hover{background:var(--accent);color:#fff}
.line-dot{position:absolute;width:10px;height:10px;border-radius:50%;background:var(--accent);border:2px solid #fff;box-shadow:0 0 4px rgba(22,119,255,.5);z-index:15;cursor:move}
.line-dot.selected{background:var(--danger);box-shadow:0 0 6px rgba(255,77,79,.6)}
.line-dot .move-controls{display:none;position:absolute;top:-26px;left:50%;transform:translateX(-50%);background:#fff;border:1px solid #d9d9d9;border-radius:4px;padding:1px;white-space:nowrap;box-shadow:0 2px 6px rgba(0,0,0,.12)}
.line-dot.selected .move-controls{display:flex;gap:1px}
.line-svg{position:absolute;top:0;left:0;pointer-events:none;z-index:5;overflow:visible}
.page-indicator{position:absolute;top:24px;left:20px;width:300px;z-index:2}
.page-indicator h2{font-size:17px;font-weight:700;color:#222;margin-bottom:4px}
.page-indicator p{font-size:12px;color:#888;line-height:1.5}
</style>
</head>
<body>

<div class="topbar">
  <h1>UI 需求标注（PRD+代码）</h1>
  <div class="tab-bar" id="tabBar"></div>
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:#1677ff"></div>PRD文档</div>
    <div class="legend-item"><div class="legend-dot" style="background:#faad14"></div>代码提取</div>
    <div class="legend-item"><div class="legend-dot" style="background:#ff4d4f"></div>文档/代码差异</div>
    <div class="legend-item"><div class="legend-dot" style="background:#52c41a"></div>补充(需确认)</div>
  </div>
</div>

<div class="scale-wrapper" id="scaleWrapper">
  <div class="canvas" id="canvas">
    <div class="ui-frame-wrap">
      <iframe src="boost-strategy-admin.html"></iframe>
      <div class="iframe-hint">请在原型中点击左侧菜单切换到对应页面</div>
      <div class="nav-guide" id="navGuide"></div>
    </div>
    <svg class="line-svg" id="lineSvg" width="1800" height="1300"></svg>
  </div>
</div>

<script>
const CANVAS_W = 1800, CANVAS_H = 1300;
let currentScale = 1;

const PAGES = [
  {
    key:'strategies', label:'1. 策略列表页', desc:'PRD 3.5 策略管理 + 3.10 运营后台页面清单',
    items:[
      {id:'s1',src:'doc',title:'侧边导航栏',desc:'[正常] PRD 3.10定义5个页面：策略列表、内容池管理、全局屏蔽池、映射表配置、系统工具。固定左侧200px深色主题，当前选中项高亮。\n[交互] 点击菜单项切换页面，顶部标题同步更新。\n[补充] 若菜单渲染失败，应显示兜底文案并提供刷新按钮。',tx:20,ty:120,px:370,py:350},
      {id:'s2',src:'code',title:'Logo 区域',desc:'[正常] 代码中固定文案"内容提权后台 v2.0"（className: logo-area），白色字体高56px居中，底部1px分割线。\n[极限] 固定文案不可修改。',tx:20,ty:290,px:380,py:55},
      {id:'s3',src:'doc',title:'顶部标题栏 + 同步状态',desc:'[正常] PRD 3.7：左侧当前页标题，右侧操作人。\n[状态] 若同步已暂停（PRD Level 1止血），操作人左侧显示红色"同步已暂停"标签。\n[代码] syncPaused 状态驱动，Tag color="red"。',tx:450,ty:762,px:750,py:748},
      {id:'s4',src:'doc',title:'统计卡片组（5张）',desc:'[正常] PRD 3.5.3：策略状态统计。5张卡片横排：总数(蓝)、生效中(绿)、草稿(灰)、已过期(橙)、已停用(红)。数字28px加粗。\n[数据] 实时反映全量统计，不受筛选影响。\n[缺省] 无策略时所有卡片显示"0"。\n[代码] counts = useMemo 计算。',tx:1340,ty:100,px:1100,py:130},
      {id:'s5',src:'doc',title:'筛选工具栏',desc:'[正常] PRD 3.5.3定义：按名称/状态/等级筛选。\n[代码] 4个控件：搜索名称(Input 200px)、状态下拉(active/draft/expired/disabled 来自STATUS_MAP)、等级下拉(S+~D 来自BOOST_LEVELS)、"+ 新建策略"按钮。\n[交互] 实时过滤，无需点搜索按钮。\n[缺省] 无匹配时表格空状态。',tx:1340,ty:270,px:1200,py:218},
      {id:'s6',src:'doc',title:'策略名称列',desc:'[正常] PRD 3.5.2：策略名称，必填，最多50字符，不允许重名。蓝色链接样式。\n[交互] 点击打开编辑抽屉（openSDrawer）。\n[极限] 超180px截断省略号，hover显示完整。',tx:20,ty:440,px:430,py:335},
      {id:'s7',src:'diff',title:'提权等级标签',desc:'[差异] PRD 2.3映射表定义等级为SS/S/A+/A/B+/B/B-/C+/C/C-/D/DOWN/BLOCK共17级。\n代码BOOST_LEVELS仅含S+/S/A+/A/B+/B/C+/C/D共9级，缺少SS/B-/C-/DOWN/BLOCK，且用S+替代了SS。\n研发需对齐PRD补全等级选项。\n[正常] 彩色Tag展示，颜色来自LEVEL_COLORS常量。',tx:20,ty:590,px:570,py:335},
      {id:'s8',src:'code',title:'状态列 Badge',desc:'[正常] 代码STATUS_MAP定义4种状态：active(绿/success)、draft(灰/default)、expired(橙/warning)、disabled(红/error)。\n[业务] PRD 3.5.3生命周期：草稿→生效中→已过期/已停用。',tx:1340,ty:430,px:1200,py:335},
      {id:'s9',src:'doc',title:'关联内容池列',desc:'[正常] PRD 3.5.1：一个策略对应多个内容池（取并集），池独占绑定。Tag列表展示绑定池名。\n[缺省] 未关联时灰色"未关联"（代码: Text type="secondary"）。\n[极限] 超3个Tag在200px内截断，hover Tooltip。',tx:1340,ty:555,px:1150,py:375},
      {id:'s10',src:'doc',title:'操作按钮组',desc:'[正常] PRD 3.5.3定义操作：启用/停用/编辑/复制/删除。\n[启用/停用] 按当前状态动态切换文案，点击立即切换并写操作日志（代码: toggleStrategy→setLogs）。\n[删除] PRD要求二次确认"删除策略后，关联内容的提权将立即失效，确认删除？"\n[差异] 代码Popconfirm文案为"确定删除该策略？"，缺少"提权立即失效"的提示，需对齐PRD。\n[复制] 名称+"(副本)"，状态=draft，poolIds清空。',tx:1340,ty:680,px:1280,py:415},
      {id:'s11',src:'extra',title:'分页器',desc:'[补充] PRD未明确分页规则。代码pageSize=10。\n[正常] 表格底部分页，每页10条，显示总条数。\n[缺省] 仅1页时分页器仍显示，页码按钮置灰。',tx:20,ty:720,px:700,py:680},
    ]
  },
  {
    key:'pools', label:'2. 内容池管理', desc:'PRD 3.3 提权对象管理（内容池）',
    items:[
      {id:'p1',src:'doc',title:'筛选工具栏',desc:'[正常] PRD 3.10：内容池一览，按名称/类型筛选。\n[代码] 搜索池名称(200px) + 类型下拉(rule=规则型/manual=人工型) + "+ 新建内容池"按钮。\n[交互] 输入即过滤。',tx:1340,ty:100,px:1100,py:110},
      {id:'p2',src:'doc',title:'池名称列',desc:'[正常] 蓝色链接，点击打开编辑抽屉（openPDrawer）。\n[极限] 超180px截断省略号。',tx:20,ty:120,px:430,py:178},
      {id:'p3',src:'doc',title:'池类型标签',desc:'[正常] PRD 3.3.2：池子类型互斥，规则型=蓝色Tag，人工型=绿色Tag。\n[约束] 创建后类型不可修改。\n[代码] 编辑时Select disabled={!!editingP}。',tx:20,ty:255,px:530,py:178},
      {id:'p4',src:'code',title:'内容数量列',desc:'[正常] 千分位格式(toLocaleString)，支持列头排序(sorter)。\n[缺省] 新建/空池显示"0"。',tx:20,ty:380,px:620,py:218},
      {id:'p5',src:'doc',title:'绑定策略列',desc:'[正常] PRD 3.3.1：V1池独占绑定，一个池只能被一个策略绑定。已绑定显示紫色Tag策略名。\n[缺省] 未绑定显示灰色"未绑定"。\n[业务] 独占原因：共享池存在"提权扩散"风险。',tx:20,ty:500,px:720,py:258},
      {id:'p6',src:'doc',title:'操作按钮组',desc:'[正常] PRD 3.10：编辑/查看内容/复制/删除。\n[查看内容] 点击打开内容查看弹窗（PRD 3.3.6）。\n[删除联动] 代码deletePool中自动从strategies的poolIds移除。\n[复制] 名称+"(副本)"，strategyId=null。',tx:1340,ty:235,px:1250,py:218},
      {id:'p7',src:'doc',title:'TTL列',desc:'[正常] PRD 3.3.4：内容有效期，基准为首次入池时间(first_hit_time)。\n选项：3天/7天/14天/30天/跟随规则。\n[业务] 规则变更不重置TTL，仅出池后再命中才重新记录。',tx:1340,ty:395,px:1100,py:298},
      {id:'p8',src:'extra',title:'创建时间列',desc:'[补充] PRD未定义此列。代码展示createdAt字段，格式YYYY-MM-DD HH:mm。\n[排序] 默认按时间倒序。',tx:1340,ty:520,px:1150,py:338},
    ]
  },
  {
    key:'pool_drawer_rule', label:'3. 内容池抽屉(规则型)', desc:'PRD 3.3.3 规则引擎 + 3.3.4 TTL + 黑名单',
    items:[
      {id:'pr1',src:'code',title:'抽屉标题与按钮',desc:'[正常] 代码: editingP?"编辑内容池":"新建内容池"，宽620px。右上角"取消"+"保存"按钮。\n[交互] 取消关闭不保存；保存触发pForm.validateFields校验。\n[校验失败] 必填字段红色错误提示。',tx:1340,ty:100,px:1260,py:55},
      {id:'pr2',src:'doc',title:'池名称',desc:'[正常] PRD 3.3：必填。\n[校验] rules: required，空提交显示"请输入"。\n[补充] PRD未定义长度限制，建议50字符上限。',tx:1340,ty:240,px:1150,py:138},
      {id:'pr3',src:'doc',title:'类型选择',desc:'[正常] PRD 3.3.2：规则型/人工型互斥。\n[约束] 编辑已有池时disabled不可改。\n[联动] 切换类型→下方表单区完全替换（代码PoolTypeWatch组件）。',tx:1340,ty:370,px:1150,py:198},
      {id:'pr4',src:'doc',title:'规则条件组(AND)',desc:'[正常] PRD 3.3.3定义V1支持6个字段：话题(topic)、标签(tags)、板块(forum_name)、作者ID(author_id)、是否认证(is_certified)、发布时间(publish_time)。所有规则AND关系。\n[差异] 代码RULE_FIELDS中"板块"key为section，PRD定义为forum_name；代码"标签"key为tag，PRD定义为tags。研发需对齐字段名。\n[交互] "+ 添加条件"新增行(Form.List add)；"X"删除行，至少保留1行。\n[算子] PRD定义：contains_any/contains_all/==/in/>/</between/last_n_days。\n[差异] 代码RULE_OPERATORS含eq/neq/contains/in/gt/lt/between/last_n_days，多了neq(不等于)，PRD中无此算子，需确认。',tx:20,ty:120,px:370,py:308},
      {id:'pr5',src:'doc',title:'屏蔽内容ID(黑名单)',desc:'[正常] PRD 3.3.3黑名单机制：屏蔽内容ID，剔除单篇不合规内容。\n[业务] 黑名单 > 规则，命中即强制不入池。\n[代码] TextArea，每行一个ID。\n[缺省] 空=不屏蔽。',tx:20,ty:370,px:370,py:448},
      {id:'pr6',src:'doc',title:'屏蔽作者ID(黑名单)',desc:'[正常] PRD 3.3.3：屏蔽作者ID，剔除指定作者所有内容。\n[代码] TextArea，每行一个作者ID。\n[缺省] 空=不屏蔽。',tx:20,ty:510,px:370,py:528},
      {id:'pr7',src:'doc',title:'TTL选择(规则型)',desc:'[正常] PRD 3.3.4定义5个选项：3天/7天/14天/30天/跟随规则。\n[业务] "跟随规则"=持续符合条件就一直在池中。\n[缺省] 代码默认"7天"。',tx:20,ty:640,px:370,py:608},
    ]
  },
  {
    key:'pool_drawer_manual', label:'4. 内容池抽屉(人工型)', desc:'PRD 3.3.5 批量导入规范',
    items:[
      {id:'pm1',src:'doc',title:'ID导入输入区',desc:'[正常] PRD 3.3.5：文本粘贴（逗号/换行分隔）。\n[代码] TextArea 4行，placeholder示例PID_001~003。\n[补充] PRD未定义上限，建议>10000条时显示加载提示。',tx:20,ty:120,px:370,py:298},
      {id:'pm2',src:'doc',title:'文件上传区',desc:'[正常] PRD 3.3.5：支持Excel/CSV上传。\n[代码] Upload.Dragger，accept .csv/.txt/.xlsx，单文件。\n[交互] 点击/拖拽触发，成功message.info"文件已解析，导入N条"。\n[补充] 格式错误应提示"仅支持CSV/TXT/XLSX"；超10MB应提示"文件过大"。',tx:20,ty:340,px:370,py:408},
      {id:'pm3',src:'doc',title:'导入模式Radio',desc:'[正常] PRD 3.3.5：支持"增量添加"和"全量覆盖"两种模式。\n[交互] PRD要求全量覆盖需二次确认"全量覆盖将清空当前池内所有内容，确认继续？"\n[差异] 代码中未实现全量覆盖的二次确认弹窗，研发需补充。\n[缺省] 默认"增量添加"。',tx:1340,ty:120,px:1150,py:498},
      {id:'pm4',src:'doc',title:'TTL选择(人工型)',desc:'[正常] PRD 3.3.5定义有效期选项：\n- 相对时间：3天/7天/30天\n- 绝对时间：指定截止日期\n- 永久有效\n[差异] 代码选项为3天/7天/14天/30天/永久，缺少"绝对时间"选项和14天（PRD未提及14天）。研发需对齐。\n[缺省] 默认"7天"。',tx:1340,ty:310,px:1150,py:568},
    ]
  },
  {
    key:'strategy_drawer', label:'5. 策略编辑抽屉', desc:'PRD 3.5.2 策略要素配置',
    items:[

// ===================== STATE =====================
let currentPage = PAGES[0].key, selectedId = null;
let isDragging = false, dragEl = null, dragType = '', dragItemId = '';
let startMouseX = 0, startMouseY = 0, startElX = 0, startElY = 0, rafId = null;

function getPage() { return PAGES.find(p => p.key === currentPage); }
function getItem(id) { return getPage()?.items.find(i => i.id === id); }

// ===================== FIT-TO-SCREEN SCALING =====================
function fitToScreen() {
  const vw = window.innerWidth;
  // Scale to fit width — always fill the full browser width
  currentScale = vw / CANVAS_W;

  const canvas = document.getElementById('canvas');
  canvas.style.transform = `scale(${currentScale})`;

  const wrapper = document.getElementById('scaleWrapper');
  wrapper.style.width = vw + 'px';
  wrapper.style.height = Math.ceil(CANVAS_H * currentScale) + 'px';
}

window.addEventListener('resize', fitToScreen);

// ===================== RENDER =====================
function renderTabs() {
  const pageBtns = PAGES.map(p =>
    `<button class="tab-btn${p.key === currentPage ? ' active' : ''}" data-page="${p.key}">${p.label}</button>`
  ).join('');
  document.getElementById('tabBar').innerHTML = pageBtns;
}

function buildDOM() {
  const canvas = document.getElementById('canvas');
  canvas.querySelectorAll('.anno-box,.line-dot,.page-indicator').forEach(el => el.remove());
  document.getElementById('lineSvg').innerHTML = '';
  const page = getPage();
  if (!page) return;

  const ind = document.createElement('div');
  ind.className = 'page-indicator';
  ind.innerHTML = `<h2>${page.label}</h2><p>${page.desc}</p>`;
  canvas.appendChild(ind);

  page.items.forEach(item => {
    const srcClass = item.src === 'doc' ? 'src-doc' : item.src === 'diff' ? 'src-diff' : item.src === 'extra' ? 'src-code' : 'src-code';
    const srcLabel = item.src === 'doc' ? 'PRD' : item.src === 'code' ? '代码' : item.src === 'diff' ? '差异' : '补充';
    const srcTagClass = item.src === 'doc' ? 'doc' : item.src === 'code' ? 'code' : item.src === 'diff' ? 'diff' : 'extra';

    // Box
    const box = document.createElement('div');
    box.className = `anno-box ${srcClass}`;
    box.id = 'box_' + item.id;
    box.dataset.itemId = item.id;
    box.style.left = item.tx + 'px';
    box.style.top = item.ty + 'px';
    box.innerHTML = `<div class="drag-handle" data-drag="box" data-item="${item.id}"></div>
      <span class="src-tag ${srcTagClass}">${srcLabel}</span>
      <div class="move-controls"><button class="move-btn" data-dir="up" data-target="box_${item.id}">&#8593;</button><button class="move-btn" data-dir="down" data-target="box_${item.id}">&#8595;</button><button class="move-btn" data-dir="left" data-target="box_${item.id}">&#8592;</button><button class="move-btn" data-dir="right" data-target="box_${item.id}">&#8594;</button></div>
      <div class="anno-title" contenteditable="true" spellcheck="false">${item.title}</div>
      <div class="anno-desc" contenteditable="true" spellcheck="false">${item.desc.replace(/\n/g, '<br>')}</div>`;
    canvas.appendChild(box);

    // Dot
    const dot = document.createElement('div');
    dot.className = 'line-dot';
    dot.id = 'dot_' + item.id;
    dot.dataset.itemId = item.id;
    dot.dataset.drag = 'dot';
    dot.dataset.item = item.id;
    dot.style.left = (item.px - 5) + 'px';
    dot.style.top = (item.py - 5) + 'px';
    dot.innerHTML = `<div class="move-controls"><button class="move-btn" data-dir="up" data-target="dot_${item.id}">&#8593;</button><button class="move-btn" data-dir="down" data-target="dot_${item.id}">&#8595;</button><button class="move-btn" data-dir="left" data-target="dot_${item.id}">&#8592;</button><button class="move-btn" data-dir="right" data-target="dot_${item.id}">&#8594;</button></div>`;
    canvas.appendChild(dot);

    // SVG line
    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    line.id = 'line_' + item.id;
    line.setAttribute('stroke', '#999');
    line.setAttribute('stroke-width', '1');
    line.setAttribute('stroke-dasharray', '4,3');
    document.getElementById('lineSvg').appendChild(line);
  });

  updateSelection();
  updateAllLines();
}

function updateSelection() {
  const page = getPage();
  if (!page) return;
  page.items.forEach(item => {
    const box = document.getElementById('box_' + item.id);
    const dot = document.getElementById('dot_' + item.id);
    const line = document.getElementById('line_' + item.id);
    if (!box || !dot || !line) return;
    const s = selectedId === item.id;
    box.classList.toggle('selected', s);
    dot.classList.toggle('selected', s);
    line.setAttribute('stroke', s ? '#1677ff' : '#999');
    line.setAttribute('stroke-width', s ? '2' : '1');
    line.setAttribute('stroke-dasharray', s ? 'none' : '4,3');
  });
}

function updateLine(id) {
  const box = document.getElementById('box_' + id), dot = document.getElementById('dot_' + id), line = document.getElementById('line_' + id);
  if (!box || !dot || !line) return;
  const bx = parseFloat(box.style.left) || 0, by = parseFloat(box.style.top) || 0, bw = box.offsetWidth, bh = box.offsetHeight;
  const dx = (parseFloat(dot.style.left) || 0) + 5, dy = (parseFloat(dot.style.top) || 0) + 5;
  let sx, sy;
  if (dx > bx + bw) { sx = bx + bw; sy = Math.min(Math.max(dy, by), by + bh); }
  else if (dx < bx) { sx = bx; sy = Math.min(Math.max(dy, by), by + bh); }
  else if (dy > by + bh) { sx = Math.min(Math.max(dx, bx), bx + bw); sy = by + bh; }
  else { sx = Math.min(Math.max(dx, bx), bx + bw); sy = by; }
  line.setAttribute('x1', sx); line.setAttribute('y1', sy); line.setAttribute('x2', dx); line.setAttribute('y2', dy);
}

function updateAllLines() { getPage()?.items.forEach(item => updateLine(item.id)); }

// ===================== DRAG (scale-compensated) =====================
function onPointerDown(e) {
  const moveBtn = e.target.closest('.move-btn');
  if (moveBtn) {
    e.preventDefault(); e.stopPropagation();
    const dir = moveBtn.dataset.dir, tid = moveBtn.dataset.target, el = document.getElementById(tid);
    if (!el) return;
    let l = parseFloat(el.style.left) || 0, t = parseFloat(el.style.top) || 0;
    if (dir === 'up') t -= 10; if (dir === 'down') t += 10;
    if (dir === 'left') l -= 10; if (dir === 'right') l += 10;
    el.style.left = Math.max(0, l) + 'px'; el.style.top = Math.max(0, t) + 'px';
    const idPart = tid.replace(/^(box_|dot_)/, '');
    updateLine(idPart);
    return;
  }
  if (e.target.isContentEditable) return;
  const handle = e.target.closest('[data-drag="box"]');
  if (handle) { e.preventDefault(); const id = handle.dataset.item; startDrag(document.getElementById('box_' + id), 'box', id, e); setSelected(id); return; }
  const dot = e.target.closest('[data-drag="dot"]');
  if (dot) { e.preventDefault(); const id = dot.dataset.item; startDrag(dot, 'dot', id, e); setSelected(id); return; }
  const annoBox = e.target.closest('.anno-box');
  if (annoBox) { setSelected(annoBox.dataset.itemId); return; }
  if (!e.target.closest('.anno-box') && !e.target.closest('.line-dot') && !e.target.closest('.tab-btn')) setSelected(null);
}

function startDrag(el, type, id, e) {
  isDragging = true; dragEl = el; dragType = type; dragItemId = id;
  startMouseX = e.clientX; startMouseY = e.clientY;
  startElX = parseFloat(el.style.left) || 0; startElY = parseFloat(el.style.top) || 0;
  document.body.style.cursor = 'move'; document.body.style.userSelect = 'none';
}

function onPointerMove(e) {
  if (!isDragging || !dragEl) return;
  if (rafId) cancelAnimationFrame(rafId);
  rafId = requestAnimationFrame(() => {
    // Divide mouse delta by scale to convert screen pixels to canvas pixels
    const nx = Math.max(0, startElX + (e.clientX - startMouseX) / currentScale);
    const ny = Math.max(0, startElY + (e.clientY - startMouseY) / currentScale);
    dragEl.style.left = nx + 'px'; dragEl.style.top = ny + 'px';
    updateLine(dragItemId);
  });
}

function onPointerUp() {
  if (isDragging) {
    isDragging = false; dragEl = null;
    document.body.style.cursor = ''; document.body.style.userSelect = '';
    if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
  }
}

function setSelected(id) { if (selectedId === id) return; selectedId = id; updateSelection(); }

document.addEventListener('mousedown', onPointerDown);
document.addEventListener('mousemove', onPointerMove);
document.addEventListener('mouseup', onPointerUp);
document.getElementById('tabBar').addEventListener('click', e => {
  const btn = e.target.closest('.tab-btn');
  if (!btn) return;
  const pageKey = btn.dataset.page;
  currentPage = pageKey; selectedId = null;
  renderTabs(); buildDOM(); fitToScreen();
  navigateIframe(currentPage);
});

// ===================== IFRAME AUTO-NAVIGATION (postMessage) =====================
const NAV_CONFIG = {
  strategies:        { msgs: [{ action:'setPage', payload:'strategies' }], hint:'' },
  pools:             { msgs: [{ action:'setPage', payload:'pools' }], hint:'' },
  pool_drawer_rule:  { msgs: [{ action:'openPDrawer', payload:'rule' }], hint:'请在原型中：点击左侧"内容池" → 点击任一规则型池的"编辑"' },
  pool_drawer_manual:{ msgs: [{ action:'openPDrawer', payload:'manual' }], hint:'请在原型中：点击左侧"内容池" → 点击任一人工型池的"编辑"' },
  strategy_drawer:   { msgs: [{ action:'openSDrawer' }], hint:'请在原型中：点击左侧"策略列表" → 点击任一策略的"编辑"' },
  blocklist:         { msgs: [{ action:'setPage', payload:'blocklist' }], hint:'' },
  mapping:           { msgs: [{ action:'setPage', payload:'mapping' }], hint:'' },
  tools:             { msgs: [{ action:'setPage', payload:'tools' }], hint:'' },
  content_modal:     { msgs: [{ action:'openContentModal' }], hint:'请在原型中：点击左侧"内容池" → 点击任一池的"查看内容"' },
};

function navigateIframe(pageKey) {
  const cfg = NAV_CONFIG[pageKey];
  if (!cfg) return;
  const guide = document.getElementById('navGuide');
  const iframe = document.querySelector('iframe');

  try {
    for (const msg of cfg.msgs) {
      iframe.contentWindow.postMessage({ source: 'annotation-nav', ...msg }, '*');
    }
    guide.className = 'nav-guide ok';
    guide.textContent = '已自动切换到对应视图';
    setTimeout(() => { guide.className = 'nav-guide'; guide.textContent = ''; }, 2000);
  } catch (e) {
    // postMessage failed — show fallback hint
    if (cfg.hint) {
      guide.className = 'nav-guide fail';
      guide.textContent = cfg.hint;
    }
  }
}

// ===================== INIT =====================
renderTabs();
buildDOM();
fitToScreen();
// Navigate iframe to first page after iframe loads
document.querySelector('iframe').addEventListener('load', () => navigateIframe(currentPage), { once: true });
</script>
</body>
</html>
