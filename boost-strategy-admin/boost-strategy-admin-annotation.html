<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>内容提权策略运营后台 v2.0 - UI 需求标注文档</title>
<style>
:root { --accent: #1677ff; --danger: #ff4d4f; --border: #d9d9d9; --bg: #f0f2f5; --box-bg: #fffbe6; --box-border: #ffe58f; }
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif; background: var(--bg); color: #333; }

/* Top bar */
.topbar { position:fixed; top:0; left:0; right:0; height:48px; background:#fff; border-bottom:1px solid #e8e8e8; display:flex; align-items:center; padding:0 16px; z-index:9999; box-shadow:0 1px 4px rgba(0,0,0,.06); }
.topbar h1 { font-size:14px; font-weight:700; color:#222; margin-right:16px; white-space:nowrap; }
.tab-bar { display:flex; gap:4px; overflow-x:auto; flex:1; }
.tab-btn { padding:5px 12px; border:1px solid var(--border); border-radius:6px; background:#fff; cursor:pointer; font-size:12px; white-space:nowrap; transition:all .15s; color:#555; }
.tab-btn:hover { border-color:var(--accent); color:var(--accent); }
.tab-btn.active { background:var(--accent); color:#fff; border-color:var(--accent); }
.help-text { font-size:11px; color:#999; margin-left:12px; white-space:nowrap; }

/* Canvas */
.canvas { position:relative; margin-top:48px; width:1800px; min-height:1200px; padding:20px; }

/* iframe */
.ui-frame-wrap { position:absolute; left:340px; top:20px; width:980px; height:720px; border:2px solid #d0d0d0; border-radius:8px; overflow:hidden; background:#fff; box-shadow:0 4px 20px rgba(0,0,0,.1); z-index:1; }
.ui-frame-wrap iframe { width:100%; height:100%; border:none; }
.iframe-hint { position:absolute; bottom:-26px; left:0; right:0; text-align:center; font-size:11px; color:#aaa; }

/* Annotation box */
.anno-box { position:absolute; min-width:180px; max-width:280px; background:var(--box-bg); border:1px solid var(--box-border); border-radius:6px; padding:10px 12px; font-size:12px; line-height:1.6; z-index:10; user-select:none; box-shadow:0 2px 8px rgba(0,0,0,.08); transition:box-shadow .12s; }
.anno-box:hover { box-shadow:0 4px 16px rgba(0,0,0,.15); z-index:20; }
.anno-box.selected { border-color:var(--accent); box-shadow:0 0 0 2px rgba(22,119,255,.25); z-index:30; }
.anno-box .anno-title { font-weight:700; font-size:13px; color:#222; margin-bottom:4px; border-bottom:1px dashed #ffe58f; padding-bottom:3px; cursor:text; outline:none; }
.anno-box .anno-desc { color:#555; font-size:12px; line-height:1.65; cursor:text; outline:none; }
.anno-box .drag-handle { position:absolute; top:0; left:0; right:0; height:28px; cursor:move; }
.anno-box .move-controls { display:none; position:absolute; top:-26px; left:50%; transform:translateX(-50%); background:#fff; border:1px solid #d9d9d9; border-radius:4px; padding:1px; white-space:nowrap; box-shadow:0 2px 6px rgba(0,0,0,.12); }
.anno-box.selected .move-controls { display:flex; gap:1px; }
.move-btn { width:20px; height:20px; border:none; background:#fafafa; cursor:pointer; font-size:13px; line-height:20px; text-align:center; border-radius:3px; color:#666; }
.move-btn:hover { background:var(--accent); color:#fff; }

/* Dot */
.line-dot { position:absolute; width:10px; height:10px; border-radius:50%; background:var(--accent); border:2px solid #fff; box-shadow:0 0 4px rgba(22,119,255,.5); z-index:15; cursor:move; }
.line-dot.selected { background:var(--danger); box-shadow:0 0 6px rgba(255,77,79,.6); }
.line-dot .move-controls { display:none; position:absolute; top:-26px; left:50%; transform:translateX(-50%); background:#fff; border:1px solid #d9d9d9; border-radius:4px; padding:1px; white-space:nowrap; box-shadow:0 2px 6px rgba(0,0,0,.12); }
.line-dot.selected .move-controls { display:flex; gap:1px; }

/* SVG */
.line-svg { position:absolute; top:0; left:0; pointer-events:none; z-index:5; overflow:visible; }

/* Page indicator */
.page-indicator { position:absolute; top:24px; left:20px; width:300px; z-index:2; }
.page-indicator h2 { font-size:17px; font-weight:700; color:#222; margin-bottom:4px; }
.page-indicator p { font-size:12px; color:#888; line-height:1.5; }
</style>
</head>
<body>

<div class="topbar">
  <h1>UI 需求标注</h1>
  <div class="tab-bar" id="tabBar"></div>
  <span class="help-text">拖拽标注框/圆点移动 | 点击文字可编辑 | 方向键微调</span>

</div>

      { id:'s4', title:'统计卡片组（5张）', desc:'[正常] 横排5张卡片：总数(蓝)、生效中(绿)、草稿(灰)、已过期(橙)、已停用(红)。数字28px加粗，下方13px灰色标签。\n[数据] 实时反映全量策略统计（不受筛选影响）。\n[缺省] 无策略时全部显示"0"。\n[交互] hover有阴影效果。', tx:1340, ty:100, px:1100, py:130 },

      { id:'c8', title:'分页与滚动', desc:'[正常] 每页8条，固定高420px滚动。\n[缺省] 无数据→空状态插画"当前内容池暂无内容"。', tx:1340, ty:520, px:900, py:600 },

// ===================== STATE =====================
let currentPage = PAGES[0].key;
let selectedId = null;
let isDragging = false;
let dragEl = null;
let dragType = ''; // 'box' or 'dot'
let dragItemId = '';
let startMouseX = 0, startMouseY = 0;
let startElX = 0, startElY = 0;
let rafId = null;

function getPage() { return PAGES.find(p => p.key === currentPage); }
function getItem(id) { return getPage()?.items.find(i => i.id === id); }

// ===================== RENDER =====================
function renderTabs() {
  const bar = document.getElementById('tabBar');
  bar.innerHTML = PAGES.map(p =>
    `<button class="tab-btn${p.key === currentPage ? ' active' : ''}" data-page="${p.key}">${p.label}</button>`
  ).join('');
}

function buildDOM() {
  const canvas = document.getElementById('canvas');
  // Clear old
  canvas.querySelectorAll('.anno-box,.line-dot,.page-indicator').forEach(el => el.remove());
  document.getElementById('lineSvg').innerHTML = '';

  const page = getPage();
  if (!page) return;

  // Page indicator
  const ind = document.createElement('div');
  ind.className = 'page-indicator';
  ind.innerHTML = `<h2>${page.label}</h2><p>${page.desc}</p>`;
  canvas.appendChild(ind);

  page.items.forEach(item => {
    // Box
    const box = document.createElement('div');
    box.className = 'anno-box';
    box.id = 'box_' + item.id;
    box.dataset.itemId = item.id;
    box.style.left = item.tx + 'px';
    box.style.top = item.ty + 'px';
    box.innerHTML = `
      <div class="drag-handle" data-drag="box" data-item="${item.id}"></div>
      <div class="move-controls">
        <button class="move-btn" data-dir="up" data-target="box_${item.id}">↑</button>
        <button class="move-btn" data-dir="down" data-target="box_${item.id}">↓</button>
        <button class="move-btn" data-dir="left" data-target="box_${item.id}">←</button>
        <button class="move-btn" data-dir="right" data-target="box_${item.id}">→</button>
      </div>
      <div class="anno-title" contenteditable="true" spellcheck="false">${item.title}</div>
      <div class="anno-desc" contenteditable="true" spellcheck="false">${item.desc.replace(/\n/g, '<br>')}</div>
    `;
    canvas.appendChild(box);

    // Dot
    const dot = document.createElement('div');
    dot.className = 'line-dot';
    dot.id = 'dot_' + item.id;
    dot.dataset.itemId = item.id;
    dot.dataset.drag = 'dot';
    dot.dataset.item = item.id;
    dot.style.left = (item.px - 5) + 'px';
    dot.style.top = (item.py - 5) + 'px';
    dot.innerHTML = `
      <div class="move-controls">
        <button class="move-btn" data-dir="up" data-target="dot_${item.id}">↑</button>
        <button class="move-btn" data-dir="down" data-target="dot_${item.id}">↓</button>
        <button class="move-btn" data-dir="left" data-target="dot_${item.id}">←</button>
        <button class="move-btn" data-dir="right" data-target="dot_${item.id}">→</button>
      </div>
    `;
    canvas.appendChild(dot);

    // SVG line
    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    line.id = 'line_' + item.id;
    line.setAttribute('stroke', '#999');
    line.setAttribute('stroke-width', '1');
    line.setAttribute('stroke-dasharray', '4,3');
    document.getElementById('lineSvg').appendChild(line);
  });

  updateSelection();
  updateAllLines();
}

function updateSelection() {
  const page = getPage();
  if (!page) return;
  page.items.forEach(item => {
    const box = document.getElementById('box_' + item.id);
    const dot = document.getElementById('dot_' + item.id);
    const line = document.getElementById('line_' + item.id);
    if (!box || !dot || !line) return;
    const isSel = selectedId === item.id;
    box.classList.toggle('selected', isSel);
    dot.classList.toggle('selected', isSel);
    line.setAttribute('stroke', isSel ? '#1677ff' : '#999');
    line.setAttribute('stroke-width', isSel ? '2' : '1');
    line.setAttribute('stroke-dasharray', isSel ? 'none' : '4,3');
  });
}

function updateLine(itemId) {
  const box = document.getElementById('box_' + itemId);
  const dot = document.getElementById('dot_' + itemId);
  const line = document.getElementById('line_' + itemId);
  if (!box || !dot || !line) return;

  const bx = parseFloat(box.style.left) || 0;
  const by = parseFloat(box.style.top) || 0;
  const bw = box.offsetWidth;
  const bh = box.offsetHeight;
  const dx = (parseFloat(dot.style.left) || 0) + 5;
  const dy = (parseFloat(dot.style.top) || 0) + 5;

  let sx, sy;
  if (dx > bx + bw) { sx = bx + bw; sy = Math.min(Math.max(dy, by), by + bh); }
  else if (dx < bx) { sx = bx; sy = Math.min(Math.max(dy, by), by + bh); }
  else if (dy > by + bh) { sx = Math.min(Math.max(dx, bx), bx + bw); sy = by + bh; }
  else { sx = Math.min(Math.max(dx, bx), bx + bw); sy = by; }

  line.setAttribute('x1', sx);
  line.setAttribute('y1', sy);
  line.setAttribute('x2', dx);
  line.setAttribute('y2', dy);
}

function updateAllLines() {
  const page = getPage();
  if (!page) return;
  page.items.forEach(item => updateLine(item.id));
}

// ===================== DRAG (smooth, no re-render) =====================
function onPointerDown(e) {
  // Move button
  const moveBtn = e.target.closest('.move-btn');
  if (moveBtn) {
    e.preventDefault();
    e.stopPropagation();
    const dir = moveBtn.dataset.dir;
    const targetId = moveBtn.dataset.target;
    const el = document.getElementById(targetId);
    if (!el) return;
    const step = 10;
    let left = parseFloat(el.style.left) || 0;
    let top = parseFloat(el.style.top) || 0;
    if (dir === 'up') top -= step;
    if (dir === 'down') top += step;
    if (dir === 'left') left -= step;
    if (dir === 'right') left += step;
    el.style.left = Math.max(0, left) + 'px';
    el.style.top = Math.max(0, top) + 'px';
    // Sync data
    const idPart = targetId.replace(/^(box_|dot_)/, '');
    const item = getItem(idPart);
    if (item) {
      if (targetId.startsWith('box_')) { item.tx = Math.max(0, left); item.ty = Math.max(0, top); }
      else { item.px = Math.max(0, left) + 5; item.py = Math.max(0, top) + 5; }
    }
    updateLine(idPart);
    return;
  }

  // Editable text - don't start drag
  if (e.target.isContentEditable) return;

  // Drag handle on box
  const handle = e.target.closest('[data-drag="box"]');
  if (handle) {
    e.preventDefault();
    const itemId = handle.dataset.item;
    const box = document.getElementById('box_' + itemId);
    if (!box) return;
    startDrag(box, 'box', itemId, e);
    setSelected(itemId);
    return;
  }

  // Drag dot
  const dot = e.target.closest('[data-drag="dot"]');
  if (dot) {
    e.preventDefault();
    const itemId = dot.dataset.item;
    startDrag(dot, 'dot', itemId, e);
    setSelected(itemId);
    return;
  }

  // Click on box body (not editable) -> select
  const annoBox = e.target.closest('.anno-box');
  if (annoBox) {
    setSelected(annoBox.dataset.itemId);
    return;
  }

  // Click outside -> deselect
  if (!e.target.closest('.anno-box') && !e.target.closest('.line-dot') && !e.target.closest('.tab-btn')) {
    setSelected(null);
  }
}

function startDrag(el, type, itemId, e) {
  isDragging = true;
  dragEl = el;
  dragType = type;
  dragItemId = itemId;
  startMouseX = e.clientX;
  startMouseY = e.clientY;
  startElX = parseFloat(el.style.left) || 0;
  startElY = parseFloat(el.style.top) || 0;
  document.body.style.cursor = 'move';
  document.body.style.userSelect = 'none';
}

function onPointerMove(e) {
  if (!isDragging || !dragEl) return;
  if (rafId) cancelAnimationFrame(rafId);
  rafId = requestAnimationFrame(() => {
    const dx = e.clientX - startMouseX;
    const dy = e.clientY - startMouseY;
    const newX = Math.max(0, startElX + dx);
    const newY = Math.max(0, startElY + dy);
    dragEl.style.left = newX + 'px';
    dragEl.style.top = newY + 'px';
    // Sync data
    const item = getItem(dragItemId);
    if (item) {
      if (dragType === 'box') { item.tx = newX; item.ty = newY; }
      else { item.px = newX + 5; item.py = newY + 5; }
    }
    updateLine(dragItemId);
  });
}

function onPointerUp() {
  if (isDragging) {
    isDragging = false;
    dragEl = null;
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
    if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
  }
}

function setSelected(id) {
  if (selectedId === id) return;
  selectedId = id;
  updateSelection();
}

// ===================== EVENT BINDDING =====================
document.addEventListener('mousedown', onPointerDown);
document.addEventListener('mousemove', onPointerMove);
document.addEventListener('mouseup', onPointerUp);

// Tab clicks (delegation)
document.getElementById('tabBar').addEventListener('click', (e) => {
  const btn = e.target.closest('.tab-btn');
  if (!btn) return;
  currentPage = btn.dataset.page;
  selectedId = null;
  renderTabs();
  buildDOM();
});

// ===================== INIT =====================
renderTabs();
buildDOM();
</script>
