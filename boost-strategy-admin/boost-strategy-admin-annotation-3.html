// ===================== PRD MARKDOWN =====================
const PRD_MD = `# 内容提权策略 v2.0 产品需求文档

> 基于 v1.0 评审反馈修订，结合当前业务规模（几十万级内容、2人运营、首页单场景、周级别策略调整）调整。

---

## 1. 项目背景

### 1.1 需求简介

构建内部"内容提权策略模块"，将复杂的提权冲突判断与优先级排序收口到内部系统，对火山推荐系统只输出唯一的 \`boost_tag\`，彻底解决权重叠加不可控问题。

### 1.2 业务诉求

目前内容提权完全依赖火山控制台的规则配置，存在以下痛点：

1. **"加法逻辑"问题**：火山的提权规则基于"字段+算子+系数"，多规则累加生效。例如"视频加权(+20%)"和"热门话题加权(+10%)"同时命中时，内容获得 +30% 权重。策略越多，叠加效应越不可预测，容易导致"流量通胀"或"马太效应"失控
2. **黑盒运营，缺乏灵活性**：运营策略与火山底层实现深度耦合，每次调整策略都需在火山控制台操作，风险高且效率低
3. **权限问题**：所有重排参数调整共享同一控制台，搜索推荐未区分，存在分权隐患

### 1.3 核心目标

- **收口与解耦**：复杂策略冲突判断、优先级排序全部在内部系统完成；火山只执行简单的"查表"操作
- **确定性**：每篇内容在同一时刻，只受一个最核心的策略控制

---

## 2. 业务流程简述

运营在后台配置提权策略并圈选内容池 → 计算引擎按 Winner-Takes-All 规则仲裁出唯一 \`boost_tag\` → 写入本地数据库 → 调用火山 Write API 增量推送 → 火山推荐系统查表加权 → 终端用户消费内容 → 埋点数据回传 → 效果看板辅助运营优化决策。

---

## 3. 详细功能说明

### 3.1 整体架构

#### 3.1.1 系统架构

\`\`\`mermaid
flowchart TD
    A([运营后台]) -->|配置策略 & 圈选内容| B[策略管理 / 内容池管理]
    B -->|策略/内容池变更事件| C[计算引擎<br/>Winner-Takes-All<br/>输出唯一 boost_tag]
    C -->|写入本地数据库| D[(内容数据库)]
    D -->|增量推送 boost_tag| E[火山 Write API]
    E -->|查表加权（无累加）| F[火山推荐系统]
    F -->|推荐结果| G([终端用户])
    G -->|行为数据 + 埋点透传| H[效果看板]
    H -->|运营优化决策| A

    style C fill:#4A90E2,color:#fff
    style D fill:#50E3C2,color:#333
    style F fill:#F5A623,color:#fff
\`\`\`

#### 3.1.2 火山同步方式

通过火山 **Write API**（\`POST /api/v1/dataset/{dataset_id}/write\`）增量更新物品的 \`boost_tag\` 字段。

- 单次支持 10,000 条，请求体上限 10MB
- 每次策略变更涉及的内容量通常为几百到几千条，完全覆盖
- 同步延迟可做到分钟级
- **不采用 CDC/Binlog 链路**：当前数据同步为定时增量批量导入，无 CDC 基础设施，新建成本高且与当前规模不匹配

### 3.2 提权等级映射

维护一套"内部提权等级"到"火山系数"的映射表。火山推荐系统侧一次性配置完成（每个 tag 值对应一条规则，物品只能命中一条，不存在累加）。

- **位置**：运营后台 → 映射表配置页（只读查看，修改需技术确认后操作）
- **目标**：建立内部等级与火山系数的唯一确定映射

| 内部提权等级 | boost_tag 值 | 火山系数 | 适用场景 |
|------------|-------------|---------|---------|
| SS (10+) | 11 | 1.35 | SS级活动、全站级通告 |
| S (10) | 10 | 1.25 | S级活动 |
| A+ (9) | 9 | 1.23 | 核心内容、优质创作者扶持 |
| A (8) | 8 | 1.20 | 潜力内容冷启动、细分领域推荐 |
| B+ (7) | 7 | 1.17 | 实验性策略 |
| B (6) | 6 | 1.15 | 非水贴的优质内容 |
| B- (5) | 5 | 1.12 | — |
| C+ (4) | 4 | 1.10 | — |
| C (3) | 3 | 1.08 | — |
| C- (2) | 2 | 1.05 | 常驻认证创作者 |
| D (1) | 1 | 1.03 | — |
| 默认 (0) | 0 | 1.0 | 普通内容 |
| DOWN-1 | -1 | 0.95 | 相对质量不高的内容 |
| DOWN-2 | -2 | 0.90 | — |
| DOWN-3 | -3 | 0.85 | — |
| DOWN-4 | -4 | 0.80 | 争议内容、低质但未违规 |
| DOWN-5 | -5 | 0.75 | — |
| BLOCK | -6 | 0.30 | 基本不出现在首页 |
| 无（默认） | null | 1.0 | 普通内容 |

### 3.3 提权对象管理（内容池）

- **位置**：运营后台 → 内容池列表页
- **目标**：定义提权策略的作用域，圈选需要提权的内容集合

#### 3.3.1 关联关系

V1 采用**池独占绑定**：一个策略可绑定多个内容池（取并集），但一个内容池只能被一个策略绑定。

> 独占绑定原因：共享池存在"提权扩散"风险——高优先级策略引用一个已被低优先级策略使用的池时，池内所有内容被意外提升。以当前运营规模（2人、周级别调整），池复用便利远小于引入的理解成本和风险。需要在不同策略中使用相同内容时，复制池配置即可。

#### 3.3.2 池子类型（互斥）

每个内容池只能是以下两种类型之一：

- **规则型**：通过元数据筛选规则自动圈选内容，支持配置"黑名单"进行例外剔除。适合长期维护的自动化策略，如"征集活动池"
- **人工型**：通过批量导入 ID（post_id）手动圈选内容。适合强运营干预的短期活动，如"优质内容池"

#### 3.3.3 规则引擎（针对规则型）

所有规则组之间默认为 AND（且）关系。V1 支持的字段与算子：

| 字段分类 | 字段名称 | 字段 Key | 值类型 | 支持算子 | 备注 |
|---------|---------|---------|--------|---------|------|
| 内容标签 | 话题 | topic | List | contains_any, contains_all | 包含任意一个或包含所有 |
| 内容标签 | 标签 | tags | List | contains_any, contains_all | 包含任意一个或包含所有 |
| 内容标签 | 板块 | forum_name | String | =, in | 如：攻略，今州茶馆 |
| 基础属性 | 作者ID | author_id | Number | =, in | 支持指定单个或多个作者 |
| 内容标签 | 是否认证 | is_certified | Boolean | = | True / False |
| 基础属性 | 发布时间 | publish_time | DateTime | >, <, between, last_n_days | 支持绝对时间与相对时间 |

示例规则：\`(话题 包含任一 "春节") AND (板块 = "攻略") AND (发布时间 最近7天)\`

**V2 扩展（待明确数据源后支持）**：
- 数据指标类：播放/阅读数、点赞数、评论数、分享数
- 标题模糊匹配（contains, not_contains）
- 是否原创

**黑名单机制（双维度）**：
- 屏蔽内容 ID：剔除单篇或多篇不合规或不需要的内容
- 屏蔽作者 ID：剔除指定作者的所有内容
- 优先级逻辑：黑名单 > 规则。只要在黑名单中，无论是否符合规则，都强制不入池

#### 3.3.4 内容有效期（TTL）

- **基准**：首次入池时间（\`first_hit_time\`）
- **存储结构**：\`pool_id + content_id + first_hit_time\`
- 规则变更导致内容重新命中时，**不重置** TTL（避免规则微调导致全量 TTL 刷新）
- 仅当内容先出池、后再次命中时，才重新记录 \`first_hit_time\`

默认选项：3 天 / 7 天 / 14 天 / 30 天 / 跟随规则（动态，只要符合规则就一直在池中）

#### 3.3.5 批量导入规范（针对人工型）

- **导入方式**：文本粘贴（逗号/换行分隔）或 Excel/CSV 上传。支持"增量添加"和"全量覆盖"两种模式
- **有效期设置（TTL）**：导入时必须明确指定有效期
  - 相对时间：入池后 3天/7天/30天过期
  - 绝对时间：指定具体截止日期（如 2025-12-31）
  - 永久有效：仅限特殊场景（如"核心白名单"），需谨慎使用

**导入交互**：
- 点击"导入"按钮，弹出模态框
- 选择导入模式（增量添加/全量覆盖），全量覆盖前需二次确认弹窗："全量覆盖将清空当前池内所有内容，确认继续？"
- 导入中：按钮变为"正在导入..."，显示加载动画，禁用状态
- 导入成功：轻提示"成功导入 {N} 条内容"，刷新列表
- 导入失败：红色轻提示"导入失败：{错误原因}"，按钮恢复可点击

#### 3.3.6 内容查看与验证

- **位置**：内容池列表页 → 每行"查看"按钮
- **交互**：点击"查看"按钮，弹出模态框
- **展示字段**：标题、封面图（缩略图，50x50）、作者名、话题/标签、阅读数、点赞数、评论数
- 标题超长时单行截断显示"..."，悬停显示完整标题
- 支持按 PID、UID、标题、作者名精准搜索
- 无数据时显示空状态插画："当前内容池暂无内容"

#### 3.3.7 动态更新与延迟

- 规则型更新：策略/规则变更时立即触发重算。期望延迟 < 5 分钟
- 人工型更新：导入后立即触发重算。期望延迟 < 5 分钟

### 3.4 全局屏蔽池

- **位置**：运营后台 → 全局屏蔽池页（独立入口）
- **目标**：独立于策略体系的系统级屏蔽机制，用于紧急处置违规内容

**功能说明**：
- 支持添加屏蔽内容 ID 和屏蔽作者 ID
- **优先级最高**，高于一切策略
- 命中全局屏蔽池的内容，\`boost_tag\` 强制设为 -6（BLOCK，系数 0.3）
- 支持批量添加/移除
- 添加时必须填写操作原因（必填文本，最多 200 字符）
- 操作记录自动关联操作人和操作时间

### 3.5 提权策略管理

- **位置**：运营后台 → 策略列表页
- **目标**：创建和管理提权策略，控制内容在推荐系统中的加权行为

#### 3.5.1 策略与内容池关系（1:N，池独占）

- 一个策略对应多个内容池（取并集）
- 一个内容池只能绑定一个策略（V1 独占）
- 示例："春节S级活动"策略可挂载"春节热门话题池"（规则型）+"春节内容精选池"（人工型）
- 生效范围：策略下所有内容池取并集，共同继承该策略的"优先级"和"提权等级"

#### 3.5.2 策略要素配置

**基础属性**：
- 策略名称：必填文本，最多 50 字符，不允许重名
- 优先级：必填正整数，范围 1-100，数字越大优先级越高
- 提权等级：必选下拉，可选项为映射表中所有等级（SS / S / A+ / ... / DOWN / BLOCK）

**有效期控制**：
- 立即生效：保存后即时生效，无结束时间
- 定时生效：绝对时间区间（如 2025-02-01 00:00:00 至 2025-02-15 23:59:59），开始时间不得早于当前时间
- 永久有效：保存后即时生效，无结束时间

**关联内容池**：
- 点击"添加内容池"，弹出可选池列表（仅显示未被其他策略绑定的池）
- 已被绑定的池在列表中置灰，悬停提示"已被策略 {策略名} 绑定"

#### 3.5.3 策略生命周期

策略状态流转：草稿 → 生效中 → 已过期 / 已停用

**策略过期处理**：
1. 策略状态立即更新为"已过期"
2. 计算引擎立即重算受影响内容的 \`boost_tag\`（回退到次级策略或 null）
3. 调用 Write API 批量推送变更

> V1 采用直接同步处理，不做异步削峰。当前规模（单策略覆盖几百到几千条内容）直接处理即可。

**策略列表页**：
- 顶部统计卡片：总数 / 生效中 / 草稿 / 已过期
- 支持按名称、状态、提权等级筛选
- 操作列：启用 / 停用 / 编辑 / 复制 / 删除
- 删除操作需二次确认弹窗："删除策略后，关联内容的提权将立即失效，确认删除？"

#### 3.5.4 优先级划分规范

| 优先级范围 | 场景定义 | 示例 |
|-----------|---------|------|
| 91-100 | 系统红线/最高干预 | 紧急公关降权、法律合规要求 |
| 71-90 | S级/A级营销活动 | 春节活动、周年庆、代言人内容 |
| 41-70 | 日常内容运营 | 垂类扶持、热点话题跟进 |
| 11-40 | 自动化/长尾策略 | 优质作者自动加权、冷启动规则 |
| 1-10 | 实验性/兜底策略 | 默认规则 |

#### 3.5.5 冲突解决（Winner-Takes-All）

当一篇内容同时命中多个有效策略时，排序规则：\`ORDER BY priority DESC, effective_at DESC\`

1. **第一优先级**：priority 数字越大，优先级越高
2. **第二优先级**：若优先级数字相同，则 \`effective_at\` 最新的策略生效

不强制要求优先级数字唯一，允许重复以降低运营维护成本。

#### 3.5.6 \`effective_at\` 字段说明

为避免非实质性编辑意外改变仲裁结果，策略表区分 \`updated_at\` 和 \`effective_at\`：

| 操作 | updated_at | effective_at |
|------|-----------|-------------|
| 新建策略 | 更新 | 更新 |
| 修改优先级 | 更新 | 更新 |
| 修改提权等级 | 更新 | 更新 |
| 修改关联内容池 | 更新 | 更新 |
| 修改名称/描述 | 更新 | **不更新** |
| 启用/停用 | 更新 | **不更新** |

#### 3.5.7 复杂场景处理

**降权与打压**：
降权是一种特殊的"高优先级"策略。创建策略时选择 DOWN 或 BLOCK 等级，并将优先级设高。由于 Winner-Takes-All 模式，一旦命中降权策略，无论同时命中多高等级的运营活动，系统都强制应用降权标签。

**多策略叠加**：
V1 明确不支持策略叠加。理由：叠加逻辑导致最终权重不可预测。若需体现叠加效果，运营应创建组合策略（如"春节优质内容"），设定更高优先级，圈选"既在春节池又在优质池"的内容并给予更高等级。

> 计分模块与策略设置/内容圈选完全解耦，后续可单独升级计算策略逻辑。

### 3.6 计算引擎

- **位置**：后台服务（无独立页面，结果体现在策略列表和内容查询中）
- **目标**：根据策略配置，为每篇内容仲裁出唯一的 \`boost_tag\`

#### 3.6.1 核心计算流程

1. **全局屏蔽检查**：若内容/作者在全局屏蔽池中，直接输出 \`boost_tag = -6\`，跳过后续步骤
2. **有效性过滤**：剔除 status != Active 或当前时间不在有效期内的策略
3. **优先级排序**：\`ORDER BY priority DESC, effective_at DESC\`
4. **择优**：取排序后 Top 1 策略作为生效策略
5. **映射**：将生效策略的内部等级映射为对应的 \`boost_tag\`
6. **兜底**：若候选集为空，则 \`boost_tag = null\`（清除提权）

#### 3.6.2 触发机制

| 触发场景 | 处理方式 |
|---------|---------|
| 策略新建/编辑/启用 | 立即重算该策略关联内容池的所有内容 \`boost_tag\`，批量推送 |
| 策略停用/删除 | 立即重算受影响内容（可能回退到次级策略或 null），批量推送 |
| 策略到达结束时间 | 定时任务（每分钟扫描）检测过期策略，触发重算并推送 |
| 内容池内容变更（人工型增删） | 立即重算变更内容的 \`boost_tag\`，批量推送 |
| 全局屏蔽池变更 | 立即将相关内容 \`boost_tag\` 设为 -6 并推送 |
| 异常修复 | 运营后台"全量重算"按钮 |

#### 3.6.3 写入防抖

计算引擎得出 NewTag 后，必须与数据库中现存 OldTag 比对。仅当 \`NewTag != OldTag\` 时，才执行更新操作和 Write API 推送，减少无效写操作。

### 3.7 风控与紧急止血

- **位置**：运营后台 → 系统工具页
- **目标**：发生严重事故时，提供无需代码发布的一键止损能力

**Level 1：暂停同步**
- 行为：暂停 \`boost_tag\` 向火山的 Write API 推送
- 效果：线上推荐维持现状，不再接受新的提权变更
- 适用：怀疑数据错乱、正在排查但未造成严重后果
- 按钮文案："暂停同步"，点击后变为橙色"同步已暂停"，旁边显示"恢复同步"按钮

**Level 2：全量归零**
- 行为：将火山侧所有已同步的 \`boost_tag\` 重置为 null（默认值）
- 效果：全站回退到纯算法推荐
- 适用：严重运营事故（如首页被低质内容占领）
- 操作需二次确认弹窗："此操作将清除火山侧所有提权标签，全站回退到纯算法推荐，确认执行？"
- 执行中显示进度："正在重置...已处理 {N}/{Total}"

**全量重算**：
- 重新计算所有生效策略下所有内容的 \`boost_tag\` 并推送
- 适用：数据异常修复场景
- 操作需确认弹窗，执行中显示进度

### 3.8 效果度量

- **位置**：V1 在策略列表页增加核心指标列；V2 做完整效果看板
- **目标**：量化评估提权策略对内容分发的实际效果

#### 3.8.1 核心指标

基于埋点透传（\`is_boosted\`、\`strategy_id\`、\`boost_level\`）：

| 指标 | 计算方式 | 用途 |
|------|---------|------|
| 提权内容曝光占比 | 提权曝光量 / 总曝光量 | 衡量提权覆盖面 |
| 提权内容点击率 | 提权内容点击量 / 提权内容曝光量 | 衡量提权内容吸引力 |
| 提权内容互动率 | 提权内容互动量 / 提权内容点击量 | 衡量深度消费 |
| 对比基线 | 同时段未提权内容的点击率/互动率 | 评估提权是否有正向效果 |
| 单策略效果 | 按 strategy_id 聚合以上指标 | 运营复盘单条策略表现 |

- 数据侧按天聚合，T+1 出报表

#### 3.8.2 策略效果预览

- **位置**：策略编辑页 → "预览效果"按钮
- **目标**：运营在上线前预览策略对推荐结果的影响

**预览流程**：
1. 运营输入一个测试用户 ID
2. 系统发起两次推荐请求：
   - 请求 A：当前线上 \`boost_tag\`（不含本策略）
   - 请求 B：模拟本策略生效后的 \`boost_tag\`
3. 左右对比展示两次推荐结果差异：
   - 新进入推荐列表的物品标记为"新增"（绿色标签）
   - 排名上升的物品标记为"上升"（蓝色箭头）
   - 被挤出的物品标记为"移出"（灰色删除线）

**降级方案**：预览不写入正式数据。若对比推荐请求不可用，只展示文字预览："本策略将影响 {N} 条内容，boost_tag 将从 {X} 变为 {Y}"

### 3.9 数据埋点与上报

#### 3.9.1 下行透传（服务端 → 客户端）

推荐接口返回列表时，若内容被提权，需在 \`track_info\` 字段中注入策略信息：

\`\`\`json
{
  "item_id": "10086",
  "title": "春节攻略...",
  "track_info": {
    "strategy_id": "S_1001",
    "boost_level": "S",
    "algo_source": "boost",
    "request_id": "req_xyz123"
  }
}
\`\`\`

#### 3.9.2 上行上报（客户端 → 数据平台）

客户端触发曝光、点击、播放等事件时，必须将该内容对应的 \`track_info\` 在对应事件中上报：

| 事件名称 | 触发时机 | 新增属性 | 属性说明 | 必填性 |
|---------|---------|---------|---------|--------|
| post_show（曝光） | 内容卡片在可见区域停留 > 1s | strategy_id | 策略 ID | 仅提权内容必填 |
| | | boost_level | 等级（SS/S/A/...） | 仅提权内容必填 |
| | | is_boosted | 是否提权（Boolean） | 必填 |
| post_read（点击） | 用户点击进入详情页 | 同上 | 同上 | 同上 |
| video_play_end（完播） | 视频播放结束/退出 | 同上 + play_duration | 播放时长（ms） | 必填 |
| post_interact（互动） | 点赞/收藏/评论/分享 | 同上 + interact_type | like/share/... | 必填 |

## 5. 实施分期

### Phase 1：核心闭环（V1）

1. 策略 CRUD + 内容池 CRUD（规则型精简字段 + 人工型）
2. 池独占绑定
3. 计算引擎（Winner-Takes-All + 直接同步处理）
4. 火山 Write API 增量推送
5. 全局屏蔽池
6. 运营后台全部页面
7. 策略效果预览（文字预览/对比预览）
8. 紧急止血（L1/L2）+ 全量重算

### Phase 2：增强能力

9. 规则型池扩展字段（数据指标类，需先明确数据源）
10. 效果度量看板
11. 池共享能力（M:N，含冲突提示）
12. 灰度验证（按流量百分比）
13. 操作审批（对高优先级策略变更）

---

## 6. 验证方式

1. **单元测试**：计算引擎的 Winner-Takes-All 仲裁逻辑、全局屏蔽优先级
2. **集成测试**：模拟策略变更 → 计算 boost_tag → 调用 Write API 推送
3. **对比测试**：同一用户 + 场景，开启/关闭策略，对比推荐结果差异
4. **运营验收**：在后台创建各类型策略和内容池，验证推荐结果符合预期

// ===================== STATE =====================
let currentPage = PAGES[0].key, selectedId = null;
let isDragging = false, dragEl = null, dragType = '', dragItemId = '';
let startMouseX = 0, startMouseY = 0, startElX = 0, startElY = 0, rafId = null;

function getPage() { return PAGES.find(p => p.key === currentPage); }
function getItem(id) { return getPage()?.items.find(i => i.id === id); }

// ===================== FIT-TO-SCREEN SCALING =====================
function fitToScreen() {
  const vw = window.innerWidth;
  // Scale to fit width — always fill the full browser width
  currentScale = vw / CANVAS_W;

  const canvas = document.getElementById('canvas');
  canvas.style.transform = `scale(${currentScale})`;

  const wrapper = document.getElementById('scaleWrapper');
  wrapper.style.width = vw + 'px';
  wrapper.style.height = Math.ceil(CANVAS_H * currentScale) + 'px';
}

window.addEventListener('resize', fitToScreen);

// ===================== RENDER =====================
function renderTabs() {
  const docBtn = `<button class="tab-btn${showingDoc ? ' active' : ''}" data-page="__doc__" style="${showingDoc ? '' : ''}">需求文档</button>`;
  const pageBtns = PAGES.map(p =>
    `<button class="tab-btn${!showingDoc && p.key === currentPage ? ' active' : ''}" data-page="${p.key}">${p.label}</button>`
  ).join('');
  document.getElementById('tabBar').innerHTML = docBtn + pageBtns;
}

function buildDOM() {
  const canvas = document.getElementById('canvas');
  canvas.querySelectorAll('.anno-box,.line-dot,.page-indicator').forEach(el => el.remove());
  document.getElementById('lineSvg').innerHTML = '';
  const page = getPage();
  if (!page) return;

  const ind = document.createElement('div');
  ind.className = 'page-indicator';
  ind.innerHTML = `<h2>${page.label}</h2><p>${page.desc}</p>`;
  canvas.appendChild(ind);

  page.items.forEach(item => {
    const srcClass = item.src === 'doc' ? 'src-doc' : item.src === 'diff' ? 'src-diff' : item.src === 'extra' ? 'src-code' : 'src-code';
    const srcLabel = item.src === 'doc' ? 'PRD' : item.src === 'code' ? '代码' : item.src === 'diff' ? '差异' : '补充';
    const srcTagClass = item.src === 'doc' ? 'doc' : item.src === 'code' ? 'code' : item.src === 'diff' ? 'diff' : 'extra';

    // Box
    const box = document.createElement('div');
    box.className = `anno-box ${srcClass}`;
    box.id = 'box_' + item.id;
    box.dataset.itemId = item.id;
    box.style.left = item.tx + 'px';
    box.style.top = item.ty + 'px';
    box.innerHTML = `<div class="drag-handle" data-drag="box" data-item="${item.id}"></div>
      <span class="src-tag ${srcTagClass}">${srcLabel}</span>
      <div class="move-controls"><button class="move-btn" data-dir="up" data-target="box_${item.id}">&#8593;</button><button class="move-btn" data-dir="down" data-target="box_${item.id}">&#8595;</button><button class="move-btn" data-dir="left" data-target="box_${item.id}">&#8592;</button><button class="move-btn" data-dir="right" data-target="box_${item.id}">&#8594;</button></div>
      <div class="anno-title" contenteditable="true" spellcheck="false">${item.title}</div>
      <div class="anno-desc" contenteditable="true" spellcheck="false">${item.desc.replace(/\n/g, '<br>')}</div>`;
    canvas.appendChild(box);

    // Dot
    const dot = document.createElement('div');
    dot.className = 'line-dot';
    dot.id = 'dot_' + item.id;
    dot.dataset.itemId = item.id;
    dot.dataset.drag = 'dot';
    dot.dataset.item = item.id;
    dot.style.left = (item.px - 5) + 'px';
    dot.style.top = (item.py - 5) + 'px';
    dot.innerHTML = `<div class="move-controls"><button class="move-btn" data-dir="up" data-target="dot_${item.id}">&#8593;</button><button class="move-btn" data-dir="down" data-target="dot_${item.id}">&#8595;</button><button class="move-btn" data-dir="left" data-target="dot_${item.id}">&#8592;</button><button class="move-btn" data-dir="right" data-target="dot_${item.id}">&#8594;</button></div>`;
    canvas.appendChild(dot);

    // SVG line
    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    line.id = 'line_' + item.id;
    line.setAttribute('stroke', '#999');
    line.setAttribute('stroke-width', '1');
    line.setAttribute('stroke-dasharray', '4,3');
    document.getElementById('lineSvg').appendChild(line);
  });

  updateSelection();
  updateAllLines();
}

function updateSelection() {
  const page = getPage();
  if (!page) return;
  page.items.forEach(item => {
    const box = document.getElementById('box_' + item.id);
    const dot = document.getElementById('dot_' + item.id);
    const line = document.getElementById('line_' + item.id);
    if (!box || !dot || !line) return;
    const s = selectedId === item.id;
    box.classList.toggle('selected', s);
    dot.classList.toggle('selected', s);
    line.setAttribute('stroke', s ? '#1677ff' : '#999');
    line.setAttribute('stroke-width', s ? '2' : '1');
    line.setAttribute('stroke-dasharray', s ? 'none' : '4,3');
  });
}

function updateLine(id) {
  const box = document.getElementById('box_' + id), dot = document.getElementById('dot_' + id), line = document.getElementById('line_' + id);
  if (!box || !dot || !line) return;
  const bx = parseFloat(box.style.left) || 0, by = parseFloat(box.style.top) || 0, bw = box.offsetWidth, bh = box.offsetHeight;
  const dx = (parseFloat(dot.style.left) || 0) + 5, dy = (parseFloat(dot.style.top) || 0) + 5;
  let sx, sy;
  if (dx > bx + bw) { sx = bx + bw; sy = Math.min(Math.max(dy, by), by + bh); }
  else if (dx < bx) { sx = bx; sy = Math.min(Math.max(dy, by), by + bh); }
  else if (dy > by + bh) { sx = Math.min(Math.max(dx, bx), bx + bw); sy = by + bh; }
  else { sx = Math.min(Math.max(dx, bx), bx + bw); sy = by; }
  line.setAttribute('x1', sx); line.setAttribute('y1', sy); line.setAttribute('x2', dx); line.setAttribute('y2', dy);
}

function updateAllLines() { getPage()?.items.forEach(item => updateLine(item.id)); }

// ===================== DRAG (scale-compensated) =====================
function onPointerDown(e) {
  const moveBtn = e.target.closest('.move-btn');
  if (moveBtn) {
    e.preventDefault(); e.stopPropagation();
    const dir = moveBtn.dataset.dir, tid = moveBtn.dataset.target, el = document.getElementById(tid);
    if (!el) return;
    let l = parseFloat(el.style.left) || 0, t = parseFloat(el.style.top) || 0;
    if (dir === 'up') t -= 10; if (dir === 'down') t += 10;
    if (dir === 'left') l -= 10; if (dir === 'right') l += 10;
    el.style.left = Math.max(0, l) + 'px'; el.style.top = Math.max(0, t) + 'px';
    const idPart = tid.replace(/^(box_|dot_)/, '');
    updateLine(idPart);
    return;
  }
  if (e.target.isContentEditable) return;
  const handle = e.target.closest('[data-drag="box"]');
  if (handle) { e.preventDefault(); const id = handle.dataset.item; startDrag(document.getElementById('box_' + id), 'box', id, e); setSelected(id); return; }
  const dot = e.target.closest('[data-drag="dot"]');
  if (dot) { e.preventDefault(); const id = dot.dataset.item; startDrag(dot, 'dot', id, e); setSelected(id); return; }
  const annoBox = e.target.closest('.anno-box');
  if (annoBox) { setSelected(annoBox.dataset.itemId); return; }
  if (!e.target.closest('.anno-box') && !e.target.closest('.line-dot') && !e.target.closest('.tab-btn')) setSelected(null);
}

function startDrag(el, type, id, e) {
  isDragging = true; dragEl = el; dragType = type; dragItemId = id;
  startMouseX = e.clientX; startMouseY = e.clientY;
  startElX = parseFloat(el.style.left) || 0; startElY = parseFloat(el.style.top) || 0;
  document.body.style.cursor = 'move'; document.body.style.userSelect = 'none';
}

function onPointerMove(e) {
  if (!isDragging || !dragEl) return;
  if (rafId) cancelAnimationFrame(rafId);
  rafId = requestAnimationFrame(() => {
    // Divide mouse delta by scale to convert screen pixels to canvas pixels
    const nx = Math.max(0, startElX + (e.clientX - startMouseX) / currentScale);
    const ny = Math.max(0, startElY + (e.clientY - startMouseY) / currentScale);
    dragEl.style.left = nx + 'px'; dragEl.style.top = ny + 'px';
    updateLine(dragItemId);
  });
}

function onPointerUp() {
  if (isDragging) {
    isDragging = false; dragEl = null;
    document.body.style.cursor = ''; document.body.style.userSelect = '';
    if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
  }
}

function setSelected(id) { if (selectedId === id) return; selectedId = id; updateSelection(); }

document.addEventListener('mousedown', onPointerDown);
document.addEventListener('mousemove', onPointerMove);
document.addEventListener('mouseup', onPointerUp);
document.getElementById('tabBar').addEventListener('click', e => {
  const btn = e.target.closest('.tab-btn');
  if (!btn) return;
  const pageKey = btn.dataset.page;
  if (pageKey === '__doc__') {
    showingDoc = true;
    document.getElementById('scaleWrapper').style.display = 'none';
    document.getElementById('docContainer').style.display = 'block';
    renderTabs();
    renderDoc();
    return;
  }
  showingDoc = false;
  document.getElementById('docContainer').style.display = 'none';
  document.getElementById('scaleWrapper').style.display = '';
  currentPage = pageKey; selectedId = null;
  renderTabs(); buildDOM(); fitToScreen();
  navigateIframe(currentPage);
});

// ===================== IFRAME AUTO-NAVIGATION (postMessage) =====================
const NAV_CONFIG = {
  strategies:        { msgs: [{ action:'setPage', payload:'strategies' }], hint:'' },
  pools:             { msgs: [{ action:'setPage', payload:'pools' }], hint:'' },
  pool_drawer_rule:  { msgs: [{ action:'openPDrawer', payload:'rule' }], hint:'请在原型中：点击左侧"内容池" → 点击任一规则型池的"编辑"' },
  pool_drawer_manual:{ msgs: [{ action:'openPDrawer', payload:'manual' }], hint:'请在原型中：点击左侧"内容池" → 点击任一人工型池的"编辑"' },
  strategy_drawer:   { msgs: [{ action:'openSDrawer' }], hint:'请在原型中：点击左侧"策略列表" → 点击任一策略的"编辑"' },
  blocklist:         { msgs: [{ action:'setPage', payload:'blocklist' }], hint:'' },
  mapping:           { msgs: [{ action:'setPage', payload:'mapping' }], hint:'' },
  tools:             { msgs: [{ action:'setPage', payload:'tools' }], hint:'' },
  content_modal:     { msgs: [{ action:'openContentModal' }], hint:'请在原型中：点击左侧"内容池" → 点击任一池的"查看内容"' },
};

function navigateIframe(pageKey) {
  const cfg = NAV_CONFIG[pageKey];
  if (!cfg) return;
  const guide = document.getElementById('navGuide');
  const iframe = document.querySelector('iframe');

  try {
    for (const msg of cfg.msgs) {
      iframe.contentWindow.postMessage({ source: 'annotation-nav', ...msg }, '*');
    }
    guide.className = 'nav-guide ok';
    guide.textContent = '已自动切换到对应视图';
    setTimeout(() => { guide.className = 'nav-guide'; guide.textContent = ''; }, 2000);
  } catch (e) {
    // postMessage failed — show fallback hint
    if (cfg.hint) {
      guide.className = 'nav-guide fail';
      guide.textContent = cfg.hint;
    }
  }
}

// ===================== DOC RENDERING =====================
let docRendered = false;
function renderDoc() {
  if (docRendered) return;
  const renderer = new marked.Renderer();
  // marked v5+ passes { text, lang } object; older versions pass (code, lang)
  renderer.code = function(codeOrObj, langArg) {
    let text, lang;
    if (typeof codeOrObj === 'object' && codeOrObj !== null) {
      text = codeOrObj.text; lang = codeOrObj.lang;
    } else {
      text = codeOrObj; lang = langArg;
    }
    if (lang === 'mermaid') {
      return '<div class="mermaid">' + text + '</div>';
    }
    const escaped = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    return '<pre><code>' + escaped + '</code></pre>';
  };
  marked.setOptions({ renderer, breaks: false, gfm: true });
  document.getElementById('docContainer').innerHTML = marked.parse(PRD_MD);
  mermaid.run({ nodes: document.querySelectorAll('#docContainer .mermaid') });
  docRendered = true;
}

// ===================== INIT =====================
renderTabs();
buildDOM();
fitToScreen();
// Navigate iframe to first page after iframe loads
document.querySelector('iframe').addEventListener('load', () => navigateIframe(currentPage), { once: true });
</script>
