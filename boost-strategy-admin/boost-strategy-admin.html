const MOCK_CONTENTS = Array.from({ length: 30 }, (_, i) => ({
  id: `PID_${300000 + i}`,
  title: ['春日好去处推荐', '如何提升写作能力', '2026年科技趋势盘点', '美食探店日记', '健身打卡第30天', '旅行攻略分享', '读书笔记：人类简史', '摄影技巧入门指南'][i % 8] + (i > 7 ? ` (${i})` : ''),

// ======================== Sub-Components ========================

// --- Content View Modal ---
function ContentViewModal({ open, pool, onClose }) {
  const [search, setSearch] = useState('');
  const filtered = useMemo(() => {
    if (!search) return MOCK_CONTENTS;
    const s = search.toLowerCase();
    return MOCK_CONTENTS.filter(c =>
      c.id.toLowerCase().includes(s) || c.authorId.toLowerCase().includes(s) ||
      c.title.includes(search) || c.author.includes(search)
    );
  }, [search]);

  const columns = [
    { title: '封面', key: 'cover', width: 70, render: () => React.createElement('div', { className: 'content-cover' }, 'IMG') },
    { title: '标题', dataIndex: 'title', key: 'title', width: 220, ellipsis: true },
    { title: '作者', dataIndex: 'author', key: 'author', width: 70 },
    { title: '话题/标签', key: 'tags', width: 200, render: (_, r) => React.createElement(React.Fragment, null,
      React.createElement(Tag, null, r.topic),
      r.tags.map(t => React.createElement(Tag, { key: t, color: 'blue' }, t))
    )},
    { title: '阅读', dataIndex: 'reads', key: 'reads', width: 80, sorter: (a, b) => a.reads - b.reads, render: v => v.toLocaleString() },
    { title: '点赞', dataIndex: 'likes', key: 'likes', width: 70, render: v => v.toLocaleString() },
    { title: '评论', dataIndex: 'comments', key: 'comments', width: 70, render: v => v.toLocaleString() },
  ];

  return React.createElement(Modal, {
    title: `内容查看 — ${pool?.name || ''}`,
    open, onCancel: onClose, footer: null, width: 960, destroyOnClose: true
  },
    React.createElement(Space, { style: { marginBottom: 12, width: '100%' }, wrap: true },
      React.createElement(Input.Search, { placeholder: '搜索 PID / UID / 标题 / 作者名', allowClear: true, style: { width: 320 }, onSearch: setSearch, onChange: e => { if (!e.target.value) setSearch(''); } }),
      React.createElement(Tag, { color: 'blue' }, `共 ${filtered.length} 条内容`)
    ),
    React.createElement(Table, { dataSource: filtered, columns, rowKey: 'id', size: 'small', pagination: { pageSize: 8 }, scroll: { y: 420 } })
  );
}

// --- Blocklist Add Modal ---
function BlocklistAddModal({ open, type, onClose, onAdd }) {
  const [form] = Form.useForm();
  const handleOk = () => {
    form.validateFields().then(values => {
      const ids = values.ids.split(/[\n,;]+/).map(s => s.trim()).filter(Boolean);
      onAdd(ids, values.reason || '手动添加');
      form.resetFields();
      onClose();
    });
  };
  return React.createElement(Modal, {
    title: `批量添加${type === 'pids' ? '屏蔽内容 ID' : '屏蔽作者 ID'}`,
    open, onCancel: onClose, onOk: handleOk, destroyOnClose: true
  },
    React.createElement(Form, { form, layout: 'vertical' },
      React.createElement(Form.Item, { name: 'ids', label: 'ID 列表（逗号、分号或换行分隔）', rules: [{ required: true, message: '请输入至少一个 ID' }] },
        React.createElement(TextArea, { rows: 4, placeholder: type === 'pids' ? 'PID_100010\nPID_100011\nPID_100012' : 'UID_200010\nUID_200011' })
      ),
      React.createElement(Form.Item, { name: 'reason', label: '操作原因' },
        React.createElement(Input, { placeholder: '如：违规内容、投诉处理' })
      )
    )
  );
}

// ======================== Main App ========================
function App() {
  const [page, setPage] = useState('strategies');
  const [strategies, setStrategies] = useState(INIT_STRATEGIES);
  const [pools, setPools] = useState(INIT_POOLS);
  const [blocklist, setBlocklist] = useState(INIT_BLOCKLIST);
  const [logs, setLogs] = useState(INIT_LOGS);
  const [syncPaused, setSyncPaused] = useState(false);

  // Strategy
  const [sDrawerOpen, setSDrawerOpen] = useState(false);
  const [editingS, setEditingS] = useState(null);
  const [sForm] = Form.useForm();
  const [sFilters, setSFilters] = useState({ name: '', status: null, level: null });

  // Pool
  const [pDrawerOpen, setPDrawerOpen] = useState(false);
  const [editingP, setEditingP] = useState(null);
  const [pForm] = Form.useForm();
  const [pFilters, setPFilters] = useState({ name: '', type: null });

  // Content modal
  const [contentModalOpen, setContentModalOpen] = useState(false);
  const [contentModalPool, setContentModalPool] = useState(null);

  // Blocklist add
  const [blockAddOpen, setBlockAddOpen] = useState(false);
  const [blockAddType, setBlockAddType] = useState('pids');

  // -------- Annotation postMessage bridge --------
  useEffect(() => {
    const handler = (e) => {
      if (!e.data || e.data.source !== 'annotation-nav') return;
      const { action, payload } = e.data;
      // Close all drawers/modals first
      setSDrawerOpen(false); setPDrawerOpen(false); setContentModalOpen(false); setBlockAddOpen(false);
      if (action === 'setPage') setPage(payload);
      if (action === 'openSDrawer') {
        setPage('strategies');
        setTimeout(() => { setEditingS(null); sForm.resetFields(); sForm.setFieldsValue({ effectType: 'immediate', priority: 50 }); setSDrawerOpen(true); }, 200);
      }
      if (action === 'openPDrawer') {
        setPage('pools');
        const target = pools.find(p => p.type === (payload || 'rule')) || pools[0];
        setTimeout(() => {
          setEditingP(target);
          pForm.setFieldsValue({ name: target.name, type: target.type, ttl: target.ttl, rules: target.rules?.length ? target.rules : [{ field: 'topic', operator: 'contains', value: '' }], blacklistPids: target.blacklistPids || '', blacklistUids: target.blacklistUids || '', importMode: target.importMode || 'incremental' });
          setPDrawerOpen(true);
        }, 200);
      }
      if (action === 'openContentModal') {
        setPage('pools');
        setTimeout(() => { setContentModalPool(pools[0]); setContentModalOpen(true); }, 200);
      }
      if (action === 'openBlockAdd') {
        setPage('blocklist');
        setTimeout(() => { setBlockAddType(payload || 'pids'); setBlockAddOpen(true); }, 200);
      }
    };
    window.addEventListener('message', handler);
    return () => window.removeEventListener('message', handler);
  }, [pools, sForm, pForm]);

  // -------- Strategy helpers --------
  const openSDrawer = useCallback((record) => {
    setEditingS(record);
    if (record) {
      sForm.setFieldsValue({
        name: record.name,
        level: record.level,
        priority: record.priority,
        effectType: record.effectType,
        timeRange: record.startTime && record.endTime ? [dayjs(record.startTime), dayjs(record.endTime)] : undefined,
        poolIds: record.poolIds,
      });
    } else {
      sForm.resetFields();
      sForm.setFieldsValue({ effectType: 'immediate', priority: 50 });
    }
    setSDrawerOpen(true);
  }, [sForm]);

  const saveStrategy = useCallback(() => {
    sForm.validateFields().then(values => {
      const { timeRange, ...rest } = values;
      const data = {
        ...rest,
        poolIds: rest.poolIds || [],
        startTime: values.effectType === 'scheduled' && timeRange ? timeRange[0].format('YYYY-MM-DD HH:mm') : null,
        endTime: values.effectType === 'scheduled' && timeRange ? timeRange[1].format('YYYY-MM-DD HH:mm') : null,
      };
      if (editingS) {
        setStrategies(prev => prev.map(s => s.id === editingS.id ? { ...s, ...data } : s));
        message.success('策略已更新');
      } else {
        setStrategies(prev => [...prev, { ...data, id: ++_sid, status: 'draft' }]);
        message.success('策略已创建');
      }
      setSDrawerOpen(false);
    });
  }, [sForm, editingS]);

  const toggleStrategy = useCallback((record) => {
    const next = record.status === 'active' ? 'disabled' : 'active';
    setStrategies(prev => prev.map(s => s.id === record.id ? { ...s, status: next } : s));
    message.success(next === 'active' ? '已启用' : '已停用');
    setLogs(prev => [{ id: Date.now(), time: dayjs().format('YYYY-MM-DD HH:mm'), operator: 'wilkins', type: '策略变更', target: record.name, detail: `状态变更为：${STATUS_MAP[next].text}` }, ...prev]);
  }, []);

  const copyStrategy = useCallback((record) => {
    const copied = { ...record, id: ++_sid, name: record.name + ' (副本)', status: 'draft', poolIds: [] };
    setStrategies(prev => [...prev, copied]);
    message.success('已复制');
  }, []);

  const deleteStrategy = useCallback((id) => {
    setStrategies(prev => prev.filter(s => s.id !== id));
    message.success('已删除');
  }, []);

  // -------- Pool helpers --------
  const openPDrawer = useCallback((record) => {
    setEditingP(record);
    if (record) {
      pForm.setFieldsValue({
        name: record.name,
        type: record.type,
        ttl: record.ttl,
        rules: record.rules?.length ? record.rules : [{ field: 'topic', operator: 'contains', value: '' }],
        blacklistPids: record.blacklistPids || '',
        blacklistUids: record.blacklistUids || '',
        importMode: record.importMode || 'incremental',
        importIds: '',
      });
    } else {
      pForm.resetFields();
      pForm.setFieldsValue({
        type: 'rule', ttl: '7天',
        rules: [{ field: 'topic', operator: 'contains', value: '' }],
        importMode: 'incremental',
      });
    }
    setPDrawerOpen(true);
  }, [pForm]);

  const savePool = useCallback(() => {
    pForm.validateFields().then(values => {
      if (editingP) {
        setPools(prev => prev.map(p => p.id === editingP.id ? { ...p, ...values } : p));
        message.success('内容池已更新');
      } else {
        setPools(prev => [...prev, { ...values, id: ++_pid, contentCount: 0, strategyId: null, createdAt: dayjs().format('YYYY-MM-DD HH:mm') }]);
        message.success('内容池已创建');
      }
      setPDrawerOpen(false);
    });
  }, [pForm, editingP]);

  const deletePool = useCallback((id) => {
    setPools(prev => prev.filter(p => p.id !== id));
    setStrategies(prev => prev.map(s => ({ ...s, poolIds: s.poolIds.filter(pid => pid !== id) })));
    message.success('已删除');
  }, []);

  const copyPool = useCallback((record) => {
    setPools(prev => [...prev, { ...record, id: ++_pid, name: record.name + ' (副本)', strategyId: null, createdAt: dayjs().format('YYYY-MM-DD HH:mm') }]);
    message.success('已复制');
  }, []);

  // -------- Blocklist helpers --------

              onChange: (checked) => {
                setSyncPaused(checked);
                message[checked ? 'warning' : 'success'](checked ? '已暂停同步下发' : '已恢复同步');
                setLogs(prev => [{ id: Date.now(), time: dayjs().format('YYYY-MM-DD HH:mm'), operator: 'wilkins', type: '紧急止血', target: '-', detail: checked ? 'Level 1: 暂停同步下发' : '恢复同步下发' }, ...prev]);
              }
            })
          )
        )
      ),

      React.createElement(Card, { size: 'small' },
        React.createElement(Row, { align: 'middle', justify: 'space-between' },
          React.createElement(Col, null,
            React.createElement(Text, { strong: true }, 'Level 2：全量归零'),
            React.createElement('br'),
            React.createElement(Text, { type: 'secondary', style: { fontSize: 13 } }, '将所有内容的提权系数归零，所有策略标记为停用。此操作不可逆，需手动重新启用策略。')
          ),
          React.createElement(Col, null,
            React.createElement(Popconfirm, {
              title: '危险操作',
              description: '确定要执行全量归零？此操作将清除所有提权系数！',
              onConfirm: () => {
                Modal.confirm({
                  title: '二次确认',
                  content: '全量归零将导致所有内容失去提权系数，所有策略变为停用状态。此操作不可逆！确定继续？',
                  okText: '确定归零',
                  okType: 'danger',
                  onOk: handleZeroOut,
                });
              }
            },
              React.createElement(Button, { danger: true, type: 'primary' }, '全量归零')
            )
          )
        )
      )
    ),

    React.createElement(Card, { title: '操作日志', size: 'small' },
      React.createElement(Table, {
        dataSource: logs, rowKey: 'id', size: 'small', pagination: { pageSize: 10 },
        columns: [
          { title: '时间', dataIndex: 'time', key: 'time', width: 150 },
          { title: '操作人', dataIndex: 'operator', key: 'operator', width: 80 },
          { title: '类型', dataIndex: 'type', key: 'type', width: 100, render: t => React.createElement(Tag, { color: t === '全量重算' ? 'blue' : t === '紧急止血' ? 'red' : t === '屏蔽' ? 'orange' : 'default' }, t) },
          { title: '对象', dataIndex: 'target', key: 'target', width: 160 },
          { title: '详情', dataIndex: 'detail', key: 'detail' },
        ]
      })
    )
  );

  // ================================================================
  // Layout
  // ================================================================
  const menuItems = [
    { key: 'strategies', label: '策略列表', icon: null },
    { key: 'pools', label: '内容池', icon: null },
    { key: 'blocklist', label: '全局屏蔽池', icon: null },
    { key: 'mapping', label: '映射表配置', icon: null },
    { key: 'tools', label: '系统工具', icon: null },
  ];

  const PAGE_TITLES = {
    strategies: '策略列表',
    pools: '内容池管理',
    blocklist: '全局屏蔽池',
    mapping: '映射表配置',
    tools: '系统工具',
  };

  const pageRenderers = {
    strategies: renderStrategies,
    pools: renderPools,
    blocklist: renderBlocklist,
    mapping: renderMapping,
    tools: renderSystemTools,
  };

  return React.createElement(Layout, { style: { minHeight: '100vh' } },
    React.createElement(Sider, { width: 200, theme: 'dark', style: { overflow: 'auto', position: 'fixed', left: 0, top: 0, bottom: 0 } },
      React.createElement('div', { className: 'logo-area' }, '内容提权后台 v2.0'),
      React.createElement(Menu, {
        theme: 'dark', mode: 'inline',
        selectedKeys: [page],
        onClick: ({ key }) => setPage(key),
        items: menuItems,
      })
    ),
    React.createElement(Layout, { style: { marginLeft: 200 } },
      React.createElement('div', { className: 'header-bar' },
        React.createElement(Text, { strong: true, style: { fontSize: 16 } }, PAGE_TITLES[page]),
        React.createElement(Space, null,
          syncPaused && React.createElement(Tag, { color: 'red' }, '同步已暂停'),
          React.createElement(Text, { type: 'secondary' }, '操作人：wilkins')
        )
      ),
      React.createElement(Content, { style: { margin: 16, padding: 24, background: '#fff', borderRadius: 8, minHeight: 'calc(100vh - 88px)', overflow: 'auto' } },
        pageRenderers[page]?.()
      )
    ),

    // Drawers & Modals
    renderStrategyDrawer(),
    renderPoolDrawer(),
    React.createElement(ContentViewModal, { open: contentModalOpen, pool: contentModalPool, onClose: () => setContentModalOpen(false) }),
    React.createElement(BlocklistAddModal, { open: blockAddOpen, type: blockAddType, onClose: () => setBlockAddOpen(false), onAdd: addBlockItems }),
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
</script>
</body>
</html>
