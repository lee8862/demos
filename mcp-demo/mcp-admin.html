    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f0f2f5; }
    .logo { height: 32px; display: flex; align-items: center; gap: 10px; padding: 0 16px; color: #fff; font-size: 16px; font-weight: 600; }
    .logo-icon { width: 32px; height: 32px; background: linear-gradient(135deg, #1677ff, #722ed1); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 14px; font-weight: 700; }
    .stat-card { background: #fff; border-radius: 8px; padding: 20px; }
    .stat-card .label { color: #8c8c8c; font-size: 14px; margin-bottom: 8px; }
    .stat-card .value { font-size: 28px; font-weight: 600; color: #262626; }
    .tool-card { border: 1px solid #f0f0f0; border-radius: 8px; padding: 16px; margin-bottom: 12px; background: #fafafa; transition: all 0.2s; }
    .tool-card:hover { border-color: #1677ff; box-shadow: 0 2px 8px rgba(22,119,255,0.1); }
    .tool-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
    .tool-name { font-weight: 600; font-size: 15px; color: #262626; font-family: 'SF Mono', Monaco, monospace; }
    .tool-desc { color: #595959; font-size: 13px; line-height: 1.6; margin-bottom: 12px; }
    .tool-meta { display: flex; gap: 8px; flex-wrap: wrap; }
    .schema-preview { background: #1e1e1e; border-radius: 8px; padding: 16px; color: #d4d4d4; font-family: 'SF Mono', Monaco, monospace; font-size: 12px; line-height: 1.6; overflow-x: auto; white-space: pre; max-height: 300px; overflow-y: auto; }
    .filter-item { display: flex; align-items: center; gap: 8px; padding: 8px 12px; background: #f6ffed; border: 1px solid #b7eb8f; border-radius: 6px; margin-bottom: 8px; }
    .page-header { background: #fff; padding: 24px 24px 0; margin: -24px -24px 24px; border-bottom: 1px solid #f0f0f0; }
    .page-title { font-size: 20px; font-weight: 600; color: #262626; margin-bottom: 4px; }
    .page-subtitle { font-size: 14px; color: #8c8c8c; margin-bottom: 16px; }
    .import-preview { border: 2px dashed #d9d9d9; border-radius: 12px; padding: 40px; text-align: center; transition: all 0.3s; cursor: pointer; }
    .import-preview:hover { border-color: #1677ff; background: #f0f5ff; }
    .empty-tools { text-align: center; padding: 40px; color: #8c8c8c; }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 6px; }
    .status-dot.active { background: #52c41a; }
    .status-dot.draft { background: #faad14; }
    .status-dot.deprecated { background: #ff4d4f; }

</head>

        {

              React.createElement(Popconfirm, { title: '确认下架？下架后已有 KEY 引用不受影响', onConfirm: () => { r.status = 'deprecated'; setServices([...services]); message.warning('已下架'); } },
                React.createElement(Button, { type: 'link', size: 'small', danger: true }, '下架')

          )
        }

        if (!tools || tools.length === 0) return React.createElement(Empty, { description: '暂无工具' });

          React.createElement('div', { className: 'tool-header' },
            React.createElement('span', { className: 'tool-name' }, t.name),
            React.createElement(Space, { size: 4 },
              React.createElement(Tag, { color: securityColors[t.security_level] }, securityLabels[t.security_level]),

      };

      const handleCreate = () => {
        form.validateFields().then(values => {
          const newService = {
            ...values,
            status: 'draft',
            tools_count: 0,
            key_refs: 0,
            tools: [],

                ),
                React.createElement(Form.Item, { name: 'description', label: '服务描述', rules: [{ required: true }] },
                  React.createElement(TextArea, { rows: 3, placeholder: '描述该服务的业务域和能力范围' })
                ),
                React.createElement(Row, { gutter: 16 },
                  React.createElement(Col, { span: 8 },
                    React.createElement(Form.Item, { name: 'category', label: '服务类型', rules: [{ required: true }], initialValue: 'tat' },
                      React.createElement(Select, null,
                        React.createElement(Option, { value: 'uat' }, 'UAT（个人）'),
                        React.createElement(Option, { value: 'tat' }, 'TAT（共享）')

                    )

                  React.createElement(Col, { span: 8 },
                    React.createElement(Form.Item, { name: 'version', label: '版本号', rules: [{ required: true }], initialValue: '1.0.0' },
                      React.createElement(Input, null)
                    )

                  React.createElement(Col, { span: 8 },
                    React.createElement(Form.Item, { name: 'maintainer', label: '维护团队', rules: [{ required: true }] },
                      React.createElement(Input, { placeholder: 'platform-team' })
                    )
                  )
                ),
                React.createElement(Form.Item, { name: 'endpoint', label: 'Endpoint', rules: [{ required: true, type: 'url' }] },
                  React.createElement(Input, { placeholder: 'https://mcp.internal/feishu-xxx-shared' })
                )
              )
            ),
            // Add Tool Modal
            React.createElement(Modal, {
              title: '添加工具', open: editToolVisible, width: 720,
              onCancel: () => { setEditToolVisible(false); toolForm.resetFields(); },
              onOk: () => {
                toolForm.validateFields().then(values => {
                  if (selectedService) {
                    selectedService.tools.push(values);
                    selectedService.tools_count = selectedService.tools.length;
                    setServices([...services]);
                  }
                  setEditToolVisible(false);
                  toolForm.resetFields();
                  message.success('工具已添加');
                });
              },
              okText: '添加'
            },
              React.createElement(Form, { form: toolForm, layout: 'vertical' },
                React.createElement(Row, { gutter: 16 },
                  React.createElement(Col, { span: 12 },
                    React.createElement(Form.Item, { name: 'name', label: '工具名', rules: [{ required: true }, { pattern: /^[a-z0-9_]{3,64}$/, message: '小写字母+数字+下划线' }] },
                      React.createElement(Input, { placeholder: 'list_user_events' })
                    )
                  ),
                  React.createElement(Col, { span: 12 },
                    React.createElement(Form.Item, { name: 'feishu_api', label: '飞书 API 标识' },
                      React.createElement(Input, { placeholder: 'calendar.v4.events.list' })
                    )
                  )
                ),
                React.createElement(Form.Item, { name: 'description', label: '工具描述（影响 LLM 选工具准确度）', rules: [{ required: true }] },
                  React.createElement(TextArea, { rows: 3, placeholder: '清晰描述该工具的功能、返回内容、使用场景', showCount: true, maxLength: 200 })
                ),
                React.createElement(Row, { gutter: 16 },
                  React.createElement(Col, { span: 8 },
                    React.createElement(Form.Item, { name: 'security_level', label: '安全等级', rules: [{ required: true }], initialValue: 'filtered' },
                      React.createElement(Select, null,
                        React.createElement(Option, { value: 'open' }, '① 开放 open'),
                        React.createElement(Option, { value: 'filtered' }, '③ 过滤 filtered'),
                        React.createElement(Option, { value: 'restricted' }, '④ 受限 restricted')
                      )
                    )
                  ),
                  React.createElement(Col, { span: 8 },
                    React.createElement(Form.Item, { name: 'operation', label: '操作类型', rules: [{ required: true }], initialValue: 'read' },
                      React.createElement(Select, null,
                        React.createElement(Option, { value: 'read' }, '读操作 read'),
                        React.createElement(Option, { value: 'write' }, '写操作 write')
                      )
                    )
                  ),
                  React.createElement(Col, { span: 8 },
                    React.createElement(Form.Item, { name: 'audit_level', label: '审计级别', rules: [{ required: true }], initialValue: 'standard' },
                      React.createElement(Select, null,
                        React.createElement(Option, { value: 'standard' }, '标准审计'),
                        React.createElement(Option, { value: 'enhanced' }, '强审计')
                      )
                    )
                  )
                ),
                React.createElement(Divider, { orientation: 'left', plain: true }, '入参定义（JSON Schema）'),
                React.createElement(Form.Item, { name: 'input_schema_raw' },
                  React.createElement(TextArea, { rows: 8, placeholder: '{\n  "type": "object",\n  "properties": {\n    "user_id": { "type": "string", "description": "用户ID" }\n  },\n  "required": ["user_id"]\n}', style: { fontFamily: 'SF Mono, Monaco, monospace', fontSize: 12 } })
                )
              )
            ),
            // Import Modal
            React.createElement(Modal, {
              title: '批量导入 MCP 服务', open: importVisible, width: 640,
              onCancel: () => setImportVisible(false),
              footer: [
                React.createElement(Button, { key: 'cancel', onClick: () => setImportVisible(false) }, '取消'),
                React.createElement(Button, { key: 'template', icon: React.createElement(icons.DownloadOutlined) }, '下载模板'),
                React.createElement(Button, { key: 'import', type: 'primary', icon: React.createElement(icons.UploadOutlined) }, '确认导入')
              ]
            },
              React.createElement('div', { className: 'import-preview', style: { marginBottom: 16 } },
                React.createElement(icons.InboxOutlined, { style: { fontSize: 48, color: '#1677ff', marginBottom: 8 } }),
                React.createElement('div', null,
                  React.createElement(Text, { style: { fontSize: 16 } }, '点击或拖拽 JSON 文件到此区域')
                ),
                React.createElement('div', null,
                  React.createElement(Text, { type: 'secondary' }, '支持单文件包含多个 MCP 服务定义')
                )
              ),
              React.createElement(Alert, {
                message: 'JSON 文件格式',
                description: '{ "services": [{ "mcp_id": "...", "name": "...", "tools": [...] }, ...] }',
                type: 'info', showIcon: true
              })
            )
          )
        )
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
  </script>
